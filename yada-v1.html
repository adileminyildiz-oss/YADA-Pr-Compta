<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>YADA — Version 1 (Facturation & Tiers)</title>
<style>
:root{
  --noir:#04060d;--nuit:#070d18;--panel:#0e1830;--panel2:#0c1426;--ink:#eaf1ff;--ink-soft:#a7b8d6;--ink-dim:#6b7ea6;
  --line:#1b2b4a;--line-strong:#26395f;--cy:#1e90ff;--cy2:#5ab0ff;--cy3:#6fc0ff;--gold:#f2c25b;--pos:#2fe08f;--neg:#ff6b7d;
  --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--noir);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.5}
.num{font-variant-numeric:tabular-nums}
.bg{position:fixed;inset:0;z-index:-2;background:
  radial-gradient(120% 90% at 12% -8%,#0c1a3c 0%,transparent 55%),
  radial-gradient(120% 90% at 92% 4%,#10245e 0%,transparent 52%),
  linear-gradient(180deg,#05070f,#070d18 45%,#04060d)}
/* logo */
.logo{display:inline-flex;align-items:center;gap:10px}
.logo .mark{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;background:linear-gradient(150deg,#2f6fe8,#1cc39b);box-shadow:0 0 0 1px rgba(140,190,255,.4) inset,0 0 20px rgba(46,132,255,.55);position:relative}
.logo .mark::after{content:"";position:absolute;inset:0;border-radius:9px;background:linear-gradient(150deg,rgba(255,255,255,.55),transparent 45%);mix-blend-mode:screen}
.logo .mark svg{width:20px;height:20px;position:relative}
.logo .wm b{font-size:17px;font-weight:800;letter-spacing:.02em;background:linear-gradient(180deg,#fff,#bcd4ff);-webkit-background-clip:text;background-clip:text;color:transparent}
.logo .wm span{font-size:7px;letter-spacing:.28em;color:var(--cy2);display:block;margin-top:2px}
/* buttons */
.btn{cursor:pointer;border:1px solid rgba(90,176,255,.5);border-radius:11px;padding:10px 18px;font:inherit;font-weight:650;font-size:13.5px;color:#fff;background:linear-gradient(180deg,#2b7cf0,#0a64d6);box-shadow:0 8px 20px -6px rgba(30,144,255,.55);transition:transform .15s,box-shadow .2s}
.btn:hover{transform:translateY(-1px);box-shadow:0 12px 26px -8px rgba(30,144,255,.7)}
.btn:active{transform:scale(.98)}
.btn.ghost{background:rgba(16,30,58,.55);color:var(--ink);box-shadow:none;border-color:var(--line-strong)}
.btn.ghost:hover{background:rgba(30,80,160,.32)}
.btn.gold{background:linear-gradient(180deg,#f4cf74,#d99b2a);color:#2a1c04;border-color:rgba(242,194,91,.5);box-shadow:0 8px 20px -6px rgba(242,194,91,.5)}
.btn.sm{padding:7px 13px;font-size:12px;border-radius:9px}
.btn.danger{background:rgba(60,20,26,.6);border-color:rgba(255,107,125,.5);color:#ff9aa6}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;min-width:0}
.field label{font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-dim)}
.field input,.field select{padding:10px 12px;border-radius:10px;border:1px solid var(--line-strong);background:rgba(6,12,26,.6);color:var(--ink);font:inherit;font-size:14px;outline:none;min-width:0}
.field input:focus,.field select:focus{border-color:var(--cy);box-shadow:0 0 0 3px rgba(30,144,255,.22)}
.field option{background:#0c1a2a}
.row{display:grid;gap:12px}.row.g2{grid-template-columns:1fr 1fr}.row.g3{grid-template-columns:1fr 1fr 1fr}
@media(max-width:640px){.row.g2,.row.g3{grid-template-columns:1fr}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px}
.card h2{margin:0 0 4px;font-size:17px;font-weight:750}
.card .sub{color:var(--ink-soft);font-size:13px;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-dim);padding:8px 10px;border-bottom:1px solid var(--line)}
td{padding:9px 10px;border-bottom:1px solid var(--line)}
td.r,th.r{text-align:right}
.tag{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:999px}
.tag.f{color:var(--gold);background:rgba(242,194,91,.12)}.tag.c{color:var(--cy2);background:rgba(30,144,255,.14)}
.empty{color:var(--ink-dim);font-style:italic;padding:22px;text-align:center}
/* shell */
#app{min-height:100vh}
.layout{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
@media(max-width:820px){.layout{grid-template-columns:1fr}.side{display:none}}
.side{background:linear-gradient(180deg,rgba(16,36,88,.5),rgba(6,11,24,.55));backdrop-filter:blur(14px);border-right:1px solid var(--line);padding:18px 12px;display:flex;flex-direction:column;gap:3px}
.side .logo{margin:4px 8px 18px}
.nsec{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-dim);margin:12px 10px 6px}
.nav a{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;color:var(--ink-soft);font-size:13.5px;cursor:pointer;text-decoration:none}
.nav a:hover{background:rgba(120,170,255,.1);color:var(--ink)}
.nav a.on{color:#fff;background:rgba(30,144,255,.22);box-shadow:inset 0 0 0 1px rgba(140,190,255,.4)}
.nav a svg{width:16px;height:16px}
.side-foot{margin-top:auto;padding-top:10px;border-top:1px solid var(--line)}
.side-foot .cab{font-size:11px;color:var(--ink-dim);padding:4px 10px}.side-foot .cab b{color:var(--ink);display:block}
.main{padding:30px 34px 60px;max-width:1080px}
.page-head{margin-bottom:20px}
.page-head h1{margin:0;font-size:26px;font-weight:800;letter-spacing:-.02em}
.page-head p{margin:4px 0 0;color:var(--ink-soft);font-size:14px}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.search{flex:1;min-width:200px;padding:10px 14px;border-radius:11px;border:1px solid var(--line-strong);background:rgba(6,12,26,.55);color:var(--ink);font-size:14px;outline:none}
.search:focus{border-color:var(--cy);box-shadow:0 0 0 3px rgba(30,144,255,.22)}
/* entrée / dossiers */
.entry{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:40px 20px;text-align:center}
.entry .logo{transform:scale(1.3)}
.entry h1{font-size:30px;font-weight:800;margin:0}
.entry p{color:var(--ink-soft);margin:0}
.ds-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;width:100%;max-width:760px}
.ds-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;text-align:left;cursor:pointer;transition:.15s}
.ds-card:hover{transform:translateY(-2px);border-color:rgba(90,176,255,.4);box-shadow:0 14px 30px -16px rgba(30,144,255,.5)}
.ds-card .av{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;font-weight:800;color:#fff;background:linear-gradient(150deg,#2f6fe8,#1cc39b);margin-bottom:10px}
.ds-card b{font-size:15px}.ds-card .meta{font-size:12px;color:var(--ink-dim);margin-top:2px}
/* modal */
.ov{position:fixed;inset:0;z-index:9998;background:rgba(3,7,14,.62);display:none;align-items:center;justify-content:center;padding:20px}
.ov.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--line-strong);border-radius:16px;width:min(560px,100%);max-height:90vh;overflow:auto;padding:22px}
.modal h3{margin:0 0 14px;font-size:18px;font-weight:800}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}
/* ---- Fenêtre facture (overlay) ---- */
#fv-overlay{position:fixed;inset:0;z-index:9999;display:none;background:#0a1120}
#fv-overlay.show{display:flex}
#fv-form{width:480px;max-width:46%;height:100vh;overflow:auto;background:linear-gradient(180deg,#14365f,#0e2748 60%,#0a1b34);color:#eaf1ff;border-right:1px solid rgba(30,144,255,.4)}
#fv-prev{flex:1;height:100vh;overflow:auto;background:#525e6b;padding:26px;display:flex;flex-direction:column;align-items:center}
.fv-bar{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:14px 18px;background:linear-gradient(90deg,#0a64d6,#1e90ff);color:#fff}
.fv-bar h3{margin:0;font-size:16px;font-weight:800}
.fv-body{padding:16px 18px 40px}
.fv-f{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;min-width:0}
.fv-f label{font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:#90a8cc}
.fv-f input,.fv-f select{padding:9px 11px;border-radius:9px;border:1px solid rgba(120,160,220,.3);background:rgba(255,255,255,.05);color:#eaf1ff;font:inherit;font-size:13px;outline:none;min-width:0}
.fv-f input:focus,.fv-f select:focus{border-color:#2f8fff;box-shadow:0 0 0 3px rgba(30,144,255,.22)}
.fv-f option{background:#0c1a2a}
.fv-row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.fv-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.fv-check{flex-direction:row!important;align-items:center;gap:8px;text-transform:none!important;color:#cfe0f5!important;font-size:12.5px!important}
.fv-lhead{display:grid;grid-template-columns:40px 60px 64px 46px 28px minmax(50px,1fr);gap:5px;font-size:10px;font-weight:700;letter-spacing:.03em;opacity:.7;text-transform:uppercase;padding:0 2px 4px}
.fv-lhead .r{text-align:right}
.fv-li{border:1px solid rgba(120,160,220,.2);border-radius:10px;padding:10px;margin-bottom:9px;overflow:hidden}
.fv-li-top{display:flex;gap:6px;align-items:center;margin-bottom:6px;min-width:0}
.fv-li-top input{flex:1;min-width:0;padding:7px 9px;border-radius:8px;border:1px solid rgba(120,160,220,.3);background:rgba(255,255,255,.05);color:#eaf1ff;font:inherit;font-size:12.5px;outline:none}
.fv-x{cursor:pointer;border:1px solid rgba(120,160,220,.35);background:transparent;color:#dfe;border-radius:7px;padding:5px 9px;font-size:12px}
.fv-lgrid{display:grid;grid-template-columns:40px 60px 64px 46px 28px minmax(50px,1fr);gap:5px;align-items:center;min-width:0}
.fv-lgrid input,.fv-lgrid select{padding:6px 6px;font-size:12.5px;border-radius:7px;border:1px solid rgba(120,160,220,.3);background:rgba(255,255,255,.05);color:#eaf1ff;font:inherit;min-width:0;outline:none}
.fv-forf{display:flex;align-items:center;justify-content:center}
.fv-ltot{font-weight:700;font-size:12px;white-space:nowrap;text-align:right;padding-right:2px}
.fv-tot{margin-top:8px;border-top:1px solid rgba(120,160,220,.25);padding-top:10px}
.fv-tot-l{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}
.fv-tot-ttc{font-size:16px;font-weight:800;border-top:1px solid rgba(120,160,220,.25);margin-top:4px;padding-top:8px}
.fv-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
.fv-btn{cursor:pointer;border:1px solid rgba(90,176,255,.5);border-radius:11px;padding:11px 20px;font:inherit;font-weight:700;font-size:13px;color:#fff;background:rgba(16,30,58,.5)}
.fv-btn.sm{padding:7px 13px;font-size:12px}
.fv-btn.pri{background:linear-gradient(180deg,#2b7cf0,#0a64d6);box-shadow:0 8px 20px -6px rgba(30,144,255,.6)}
/* A4 */
.inv{font-family:"Helvetica Neue",Arial,sans-serif;color:#1a1a1a}
.inv-pages{display:flex;flex-direction:column;gap:18px;align-items:center}
.inv-page{background:#fff;color:#1a1a1a;box-sizing:border-box;width:210mm;height:297mm;max-height:297mm;overflow:hidden;padding:16mm 15mm;box-shadow:0 8px 30px rgba(0,0,0,.35);font-size:11.5px;line-height:1.5}
.inv-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:30px}
.inv-h1{font-size:32px;font-weight:800;letter-spacing:-.02em}.inv-logo{font-size:26px;font-weight:800;letter-spacing:.04em}
.inv-meta{display:grid;grid-template-columns:auto auto;gap:4px 26px;margin-bottom:26px;justify-content:start}
.inv-parties{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-bottom:22px}
.inv-parties .lbl{font-weight:700;margin-bottom:3px}.inv-parties .mail{color:#0a5ec2}
table.inv-t{width:100%;border-collapse:collapse;margin-bottom:18px}
table.inv-t thead th{background:#eee;text-align:right;padding:8px 10px;font-weight:700;font-size:11px;color:#333;text-transform:none;letter-spacing:0;border:none}
table.inv-t thead th.l{text-align:left}
table.inv-t td{padding:8px 10px;border-bottom:1px solid #eee;text-align:right;overflow-wrap:anywhere;word-break:break-word;color:#1a1a1a}
table.inv-t td.l{text-align:left}table.inv-t td.q{white-space:nowrap}
.inv-tot{margin-left:auto;width:280px}.inv-tot div{display:flex;justify-content:space-between;padding:5px 0}.inv-tot .ttc{border-top:1px solid #ccc;margin-top:2px;padding-top:6px;font-weight:700}
.inv-cond{font-size:10.5px;color:#333;margin-top:14px;line-height:1.7}
.inv-pay{background:#f4f4f4;border-radius:6px;padding:14px 18px;margin-top:22px;font-size:11px}.inv-pay .lbl{font-weight:700;margin-bottom:6px}.inv-pay .kv{display:grid;grid-template-columns:150px 1fr;gap:3px 10px}
.inv-foot-line{border-top:1px solid #ccc;margin-top:14px;padding-top:8px;font-size:9.5px;color:#888}
@media(max-width:820px){#fv-form{max-width:100%;width:100%}#fv-prev{display:none}}
@media print{@page{size:A4;margin:14mm}body *{visibility:hidden}#fv-printarea,#fv-printarea *{visibility:visible}#fv-printarea{position:absolute;inset:0}#fv-printarea .inv-page{width:auto;height:auto;max-height:none;box-shadow:none;padding:0;page-break-after:always}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0c2036;border:1px solid var(--cy);color:#eaf1ff;padding:11px 18px;border-radius:11px;z-index:99999;font-size:13.5px;box-shadow:0 10px 30px -10px rgba(0,0,0,.7);opacity:0;transition:opacity .2s}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="bg"></div>
<div id="app"></div>
<div id="fv-overlay"></div>
<div id="fv-printarea" style="position:absolute;left:-99999px;top:0"></div>
<div id="modal-ov" class="ov"><div class="modal" id="modal-c"></div></div>
<div id="toast" class="toast"></div>

<script>
/* ============================================================================
 * YADA — Version 1 : Facturation & Tiers (sans comptabilité). Autonome.
 * ==========================================================================*/
(function(){
'use strict';

/* ---------------- helpers ---------------- */
function r2(n){return Math.round((+n||0)*100)/100;}
function eur(n){return r2(n).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';}
function uid(){return 'id'+Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4);}
function todayStr(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function frDate(iso){if(!iso)return '—';var p=String(iso).split('-');return p.length===3?(p[2]+'/'+p[1]+'/'+p[0]):iso;}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function addDaysISO(iso,n){var d=new Date(iso+'T00:00:00');d.setDate(d.getDate()+(+n||0));return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function norm(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},2200);}
function adrLignes(a,cp,v){var base=String(a||'').trim();var cpv=[cp,v].filter(Boolean).join(' ').trim();var o=[];if(base)o.push(base);if(cpv)o.push(cpv);return o.length?o:['—'];}

/* ---------------- data ---------------- */
var DB={societes:[],tiers:{},factures:{},seq:{},activeId:null};
function load(){try{var s=localStorage.getItem('yada-v1');if(s){DB=JSON.parse(s);}}catch(e){}
  DB.societes=DB.societes||[];DB.tiers=DB.tiers||{};DB.factures=DB.factures||{};DB.seq=DB.seq||{};}
function save(){try{localStorage.setItem('yada-v1',JSON.stringify(DB));}catch(e){}}
function societe(){return DB.societes.find(function(s){return s.id===DB.activeId;})||null;}
function tiersList(){return DB.tiers[DB.activeId]||[];}
function clientsList(){return tiersList().filter(function(t){return t.type==='client';});}
function facturesList(){return DB.factures[DB.activeId]||[];}
function nextNum(){var s=societe();var y=new Date().getFullYear();var n=(DB.seq[DB.activeId]||0)+1;return 'FAC-'+y+'-'+String(n).padStart(3,'0');}

/* ---------------- router ---------------- */
var route='dossiers';
function go(r){route=r;render();}
window.YV={};

/* ---------------- icons ---------------- */
function svg(p){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">'+p+'</svg>';}
var IC={
  dash:svg('<rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="5" rx="1.5"/><rect x="13" y="10" width="8" height="11" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/>'),
  fac:svg('<path d="M6 3h9l3 3v15H6z"/><path d="M9 9h6M9 13h6M9 17h4"/>'),
  tiers:svg('<circle cx="9" cy="8" r="3"/><path d="M3 20a6 6 0 0112 0M16 4a3 3 0 010 6M21 20a6 6 0 00-4-5.6"/>')
};
var LOGO='<span class="logo"><span class="mark"><svg viewBox="0 0 24 24" fill="none"><path d="M5 5l7 8 7-8" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 13v6" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/><circle cx="12" cy="20.4" r="1.5" fill="#24d17a"/></svg></span><span class="wm"><b>YADA</b><span>FACTURATION · V1</span></span></span>';

/* ---------------- render ---------------- */
function render(){
  var app=document.getElementById('app');
  if(!DB.activeId || !societe()){ app.innerHTML=ecranDossiers(); return; }
  app.innerHTML=''
    +'<div class="layout"><aside class="side">'+LOGO
    +'<div class="nsec">Espace</div><nav class="nav">'
    +  navLink('facturation','Factures',IC.fac)
    +  navLink('tiers','Tiers',IC.tiers)
    +'</nav>'
    +'<div class="side-foot"><div class="cab">Dossier<b>'+esc(societe().nom)+'</b></div>'
    +'<a class="nav" style="display:block;margin-top:6px" onclick="YV.changerDossier()">↩ Changer de dossier</a></div>'
    +'</aside><main class="main">'+page()+'</main></div>';
}
function navLink(r,label,ic){return '<a class="'+(route===r?'on':'')+'" onclick="YV.go(\''+r+'\')">'+ic+label+'</a>';}
function page(){ if(route==='tiers')return pageTiers(); return pageFactures(); }

/* ---------------- écran dossiers ---------------- */
function ecranDossiers(){
  var cards=DB.societes.map(function(s){
    return '<div class="ds-card" onclick="YV.ouvrirDossier(\''+s.id+'\')">'
      +'<div class="av">'+esc((s.nom||'?')[0])+'</div>'
      +'<b>'+esc(s.nom||'—')+'</b>'
      +'<div class="meta">'+esc([s.forme,s.ville].filter(Boolean).join(' · ')||'—')+(s.siren?(' · SIREN '+esc(s.siren)):'')+'</div></div>';
  }).join('');
  return '<div class="entry">'+LOGO
    +'<h1>Espace dossiers</h1><p>Choisissez une société, ou créez-en une nouvelle.</p>'
    +'<div class="ds-grid">'+(cards||'')+'</div>'
    +'<div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">'
    +'<button class="btn gold" onclick="YV.nouveauDossier()">+ Créer une société</button>'
    +(DB.societes.length?'':'<span style="color:var(--ink-dim);font-size:13px;align-self:center">Aucune société — commencez par en créer une.</span>')
    +'</div></div>';
}

/* ---------------- page Tiers ---------------- */
function pageTiers(){
  var q=norm(window._tq||'');
  var list=tiersList().filter(function(t){return !q || norm(t.nom+' '+(t.ville||'')+' '+(t.siret||'')).indexOf(q)>=0;});
  var four=list.filter(function(t){return t.type==='fournisseur';});
  var cli=list.filter(function(t){return t.type==='client';});
  function tbl(title,tag,arr){
    var rows=arr.map(function(t){
      return '<tr><td><b>'+esc(t.nom)+'</b></td><td>'+esc([t.cp,t.ville].filter(Boolean).join(' ')||'—')+'</td><td>'+esc(t.siret||t.siren||'—')+'</td><td>'+esc(t.email||'—')+'</td>'
        +'<td class="r" style="white-space:nowrap"><button class="btn ghost sm" onclick="YV.editTiers(\''+t.id+'\')">Modifier</button> '
        +'<button class="btn danger sm" onclick="YV.delTiers(\''+t.id+'\')">Suppr.</button></td></tr>';

function totaux(){
  var htBrut=0,tva=0;
  S.lignes.forEach(function(l){var lht=l.forfait?r2(+l.pu||0):r2((+l.qte||0)*(+l.pu||0));htBrut+=lht;tva+=r2(lht*(+l.taux||0)/100);});
  htBrut=r2(htBrut);tva=r2(tva);
  var remise=0;if(S.remiseType==='pct')remise=r2(htBrut*(+S.remiseVal||0)/100);else if(S.remiseType==='eur')remise=r2(+S.remiseVal||0);
  var htNet=r2(htBrut-remise);if(remise>0&&htBrut>0)tva=r2(tva*(htNet/htBrut));
  var ttc=r2(htNet+tva);var retenue=S.retenue?r2(ttc*(+S.retenue||0)/100):0;var acompte=r2(+S.acompte||0);
  return {htBrut:htBrut,remise:remise,htNet:htNet,tva:tva,ttc:ttc,retenue:retenue,acompte:acompte,netAPayer:r2(ttc-acompte-retenue)};
}

    remiseLabel:(S.remiseType==='pct'?(S.remiseVal+' %'):(S.remiseType==='eur'?'montant':'')),
    ht:t.htNet,tva:t.tva,ttc:t.ttc,acompte:t.acompte,retenue:t.retenue,netAPayer:t.netAPayer,
    moyen:S.moyen,conditions:S.cond,escompte:S.escompte,escompteDelai:S.escompteDelai,showPay:S.showPay,cree_le:todayStr()};
}

function paginer(inv){try{
  if(!inv||inv.querySelector('.inv-pages'))return;var src=inv.querySelector('.inv-page');if(!src)return;
  var blocks=[].slice.call(src.children);var wrap=document.createElement('div');wrap.className='inv-pages';inv.insertBefore(wrap,src);
  var MAX=40,np=0,page=null,tb=null;
  function newP(){np++;page=document.createElement('div');page.className='inv-page';wrap.appendChild(page);}
  function over(){return page.scrollHeight>page.clientHeight+1;}
  function fresh(th){var t=document.createElement('table');t.className='inv-t';if(th)t.appendChild(th.cloneNode(true));tb=document.createElement('tbody');t.appendChild(tb);page.appendChild(t);}
  newP();
  for(var bi=0;bi<blocks.length&&np<MAX;bi++){var b=blocks[bi];
    if(b.tagName==='TABLE'&&b.classList.contains('inv-t')){var th=b.querySelector('thead');var trs=[].slice.call(b.querySelectorAll('tbody > tr'));fresh(th);
      for(var ri=0;ri<trs.length&&np<MAX;ri++){var r=trs[ri].cloneNode(true);tb.appendChild(r);if(over()&&tb.children.length>1){tb.removeChild(r);newP();fresh(th);tb.appendChild(r);}}}
    else{var c=b.cloneNode(true);page.appendChild(c);if(over()&&page.children.length>1){page.removeChild(c);newP();page.appendChild(c);}}}
  if(src.parentNode)src.parentNode.removeChild(src);
}catch(e){}}

    +'<div class="fv-row3"><div class="fv-f"><label>N° facture</label><input value="'+esc(S.numero)+'" oninput="YV.setS(\'numero\',this.value)"></div>'
    +'<div class="fv-f"><label>Date</label><input type="date" value="'+esc(S.date)+'" onchange="YV.setDate(this.value)"></div>'
    +'<div class="fv-f"><label>Conditions</label><select onchange="YV.setCond(this.value)">'+CONDITIONS.map(function(x){return '<option '+(x===S.cond?'selected':'')+'>'+x+'</option>';}).join('')+'</select></div></div>'
    +'<div class="fv-row2"><div class="fv-f"><label>Échéance</label><input type="date" value="'+esc(S.ech)+'" onchange="YV.setS(\'ech\',this.value)"></div>'
    +'<div class="fv-f"><label>Devise</label><select onchange="YV.setS(\'devise\',this.value)">'+DEVISES.map(function(d){var code=d.split(' ')[0];return '<option value="'+code+'" '+(code===S.devise?'selected':'')+'>'+d+'</option>';}).join('')+'</select></div></div>'
    +'<div class="fv-f"><label>Lignes</label><div id="fv-lignes">'+lignesHTML()+'</div><button class="fv-btn sm" onclick="YV.addL()" style="margin-top:8px">+ Ajouter une désignation</button></div>'
    +'<div class="fv-row2"><div class="fv-f"><label>Remise globale</label><select onchange="YV.setS(\'remiseType\',this.value)"><option value="" '+(!S.remiseType?'selected':'')+'>Aucune</option><option value="pct" '+(S.remiseType==='pct'?'selected':'')+'>% pourcentage</option><option value="eur" '+(S.remiseType==='eur'?'selected':'')+'>€ montant</option></select></div>'
    +'<div class="fv-f"><label>Valeur remise</label><input type="number" min="0" value="'+(S.remiseVal||'')+'" oninput="YV.setS(\'remiseVal\',this.value)"></div></div>'
    +'<div class="fv-row2"><div class="fv-f"><label>Acompte (€)</label><input type="number" min="0" value="'+(S.acompte||'')+'" oninput="YV.setS(\'acompte\',this.value)"></div>'
    +'<div class="fv-f"><label>Retenue garantie (%)</label><input type="number" min="0" value="'+(S.retenue||'')+'" oninput="YV.setS(\'retenue\',this.value)"></div></div>'
    +'<div class="fv-row3"><div class="fv-f"><label>Moyen</label><select onchange="YV.setS(\'moyen\',this.value)">'+MOYENS.map(function(m){return '<option '+(m===S.moyen?'selected':'')+'>'+m+'</option>';}).join('')+'</select></div>'
    +'<div class="fv-f"><label>Escompte (%)</label><input type="number" min="0" value="'+(S.escompte||'')+'" oninput="YV.setS(\'escompte\',this.value)"></div>'
    +'<div class="fv-f"><label>Délai (j)</label><input type="number" min="0" value="'+(S.escompteDelai||'')+'" oninput="YV.setS(\'escompteDelai\',this.value)"></div></div>'
    +'<div class="fv-f"><label class="fv-check"><input type="checkbox" '+(S.showPay!==false?'checked':'')+' onchange="YV.setS(\'showPay\',this.checked)"> Afficher le RIB sur la facture</label></div>'
    +'<div class="fv-tot"><div class="fv-tot-l"><span>Total HT</span><b id="fv-ht">'+eur(t.htNet)+'</b></div><div class="fv-tot-l"><span>TVA</span><b id="fv-tva">'+eur(t.tva)+'</b></div><div class="fv-tot-l fv-tot-ttc"><span>Total TTC</span><b id="fv-ttc">'+eur(t.ttc)+'</b></div></div>'
    +'<div class="fv-foot"><button class="fv-btn sm" onclick="YV.fermerFacture()">Annuler</button><button class="fv-btn pri" onclick="YV.creerFacture()">Créer la facture</button></div></div>';
}
function renderForm(){var e=document.getElementById('fv-form');if(e)e.innerHTML=formHTML();}
function renderLignes(){var e=document.getElementById('fv-lignes');if(e)e.innerHTML=lignesHTML();}
function refreshTot(){var t=totaux();var set=function(id,v){var e=document.getElementById(id);if(e)e.textContent=eur(v);};set('fv-ht',t.htNet);set('fv-tva',t.tva);set('fv-ttc',t.ttc);}
function apercu(){var host=document.getElementById('fv-prev');if(!host)return;host.innerHTML='<div class="inv">'+docHTML(factureObjet())+'</div>';var inv=host.querySelector('.inv');if(window.matchMedia&&window.matchMedia('(min-width:821px)').matches)requestAnimationFrame(function(){paginer(inv);});}
function maj(){renderLignes();refreshTot();apercu();}

window.YV.setL=function(i,f,v){var l=S.lignes[i];if(!l)return;if(f==='qte'||f==='pu'||f==='taux')l[f]=+v;else if(f==='forfait')l.forfait=!!v;else l[f]=v;maj();};
window.YV.setS=function(f,v){if(['acompte','escompte','escompteDelai','retenue','remiseVal'].indexOf(f)>=0)S[f]=+v;else if(f==='showPay')S.showPay=!!v;else S[f]=v;
  if(['type','clientId','devise','remiseType','moyen'].indexOf(f)>=0){renderForm();apercu();}else maj();};
window.YV.setDate=function(v){S.date=v;S.ech=echeanceCond(v,S.cond);renderForm();apercu();};
window.YV.setCond=function(v){S.cond=v;S.ech=echeanceCond(S.date,v);renderForm();apercu();};
window.YV.addL=function(){S.lignes.push({desc:'',qte:1,unite:'unité',pu:0,taux:20,forfait:false});renderLignes();apercu();};
window.YV.delL=function(i){S.lignes.splice(i,1);if(!S.lignes.length)S.lignes=[{desc:'',qte:1,unite:'unité',pu:0,taux:20,forfait:false}];renderLignes();apercu();};
window.YV.pdfFacture=function(){var pa=document.getElementById('fv-printarea');pa.innerHTML='<div class="inv">'+docHTML(factureObjet())+'</div>';paginer(pa.querySelector('.inv'));setTimeout(function(){window.print();},120);};
window.YV.creerFacture=function(){
  var f=factureObjet();
  DB.factures[DB.activeId]=DB.factures[DB.activeId]||[];DB.factures[DB.activeId].push(f);
  DB.seq[DB.activeId]=(DB.seq[DB.activeId]||0)+1;
  save();window.YV.fermerFacture();route='facturation';render();toast('Facture '+f.numero+' créée.');
};

/* ---------------- boot ---------------- */
load();render();
})();
</script>
</body>
</html>
