<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a1120">
<meta name="yada-version" content="0.1.0">
<title>YADA PRO</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
/* ============================================================
   YADA PRO — hub de factures (envoyer / réceptionner)
   Application mono-fichier, autonome, hors-ligne (PWA).
   ============================================================ */
:root{
  --bg:#0a1120; --surface:#111c30; --surface2:#0f1830;
  --line:rgba(120,160,220,.14); --line2:rgba(120,160,220,.24);
  --txt:#e6eefc; --muted:#9fb2d0; --faint:#6f83a6;
  --accent:#2f8fff; --accent2:#5ab0ff; --accent-d:#0a64d6;
  --good:#24d17a; --warn:#f4b740; --bad:#ff6b6b;
  --radius:14px; --radius-s:10px; --shadow:0 10px 30px rgba(0,0,0,.35);
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:var(--sans); color:var(--txt); line-height:1.5;
  background:radial-gradient(1100px 620px at 82% -8%, rgba(47,143,255,.16), transparent 60%),
             radial-gradient(900px 560px at -6% 108%, rgba(90,176,255,.10), transparent 55%),
             linear-gradient(180deg,#0a1120,#0b1322 40%,#0a1120);
  -webkit-font-smoothing:antialiased;}
a{color:var(--accent2);text-decoration:none}
button{font:inherit}

/* coquille */
.app{display:grid; grid-template-columns:242px 1fr; min-height:100dvh}
aside{position:sticky; top:0; height:100dvh; overflow:auto; display:flex; flex-direction:column; gap:4px; padding:20px 14px;
  background:linear-gradient(180deg,rgba(16,32,66,.55),rgba(9,16,34,.7)); backdrop-filter:blur(18px) saturate(1.3); border-right:1px solid var(--line);}
.brand{display:flex; align-items:center; gap:11px; padding:4px 6px 14px}
.brand .name{font-weight:800; font-size:19px; letter-spacing:.04em}
.brand .sub{display:block; font-size:11px; font-weight:700; color:var(--accent2); letter-spacing:.18em}
.nav-sec{font-size:11px; letter-spacing:.14em; color:var(--faint); text-transform:uppercase; margin:14px 8px 6px}
.nav-btn{display:flex; align-items:center; gap:10px; width:100%; text-align:left; padding:10px 12px; border-radius:var(--radius-s);
  border:1px solid transparent; background:transparent; color:var(--muted); font-size:14px; cursor:pointer; transition:.15s;}
.nav-btn:hover{background:rgba(47,143,255,.10); color:var(--txt)}
.nav-btn.active{background:linear-gradient(180deg,rgba(47,143,255,.22),rgba(47,143,255,.10)); border-color:rgba(47,143,255,.5); color:#fff; box-shadow:0 0 18px rgba(47,143,255,.22);}
.nav-btn .ico{width:18px; text-align:center}
.nav-btn .badge{margin-left:auto; font-size:11px; font-weight:700; background:rgba(47,143,255,.18); color:var(--accent2); border-radius:999px; padding:1px 8px}
.side-foot{margin-top:auto; padding-top:12px; border-top:1px solid var(--line); color:var(--faint); font-size:11.5px}

main{padding:30px clamp(16px,3.5vw,48px); min-width:0}
.page-head{display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-bottom:22px}
.page-head h1{margin:0; font-size:24px; text-wrap:balance}
.page-head .spacer{flex:1}
.tag{font-size:12px; font-weight:700; border-radius:999px; padding:2px 10px; border:1px solid var(--line2)}
.t-draft{color:var(--faint)} .t-sent{color:var(--good); border-color:rgba(36,209,122,.4); background:rgba(36,209,122,.10)}
.t-todo{color:var(--warn); border-color:rgba(244,183,64,.4); background:rgba(244,183,64,.10)}
.t-done{color:var(--good); border-color:rgba(36,209,122,.4); background:rgba(36,209,122,.10)}

.grid{display:grid; gap:16px}
.g3{grid-template-columns:repeat(3,1fr)} .g2{grid-template-columns:repeat(2,1fr)}
@media(max-width:900px){.g3,.g2{grid-template-columns:1fr}}
.card{background:linear-gradient(180deg,var(--surface),var(--surface2)); border:1px solid var(--line); border-radius:var(--radius); padding:20px 22px; box-shadow:var(--shadow);}
.card h2{margin:0 0 12px; font-size:16px}
.kpi .lbl{font-size:12px; color:var(--muted); letter-spacing:.02em}
.kpi .val{font-size:26px; font-weight:800; margin-top:4px; font-variant-numeric:tabular-nums}
.kpi .val.blue{color:var(--accent2)} .kpi .val.good{color:var(--good)} .kpi .val.warn{color:var(--warn)}

label{display:block; font-size:12.5px; color:var(--muted); margin:0 0 5px}
input,select,textarea{width:100%; padding:9px 11px; border-radius:var(--radius-s); border:1px solid var(--line2);
  background:#0b1526; color:var(--txt); font:inherit; font-size:14px;}
input:focus,select:focus,textarea:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(47,143,255,.18)}
.field{margin-bottom:12px}
.row{display:grid; gap:12px} .row.c4{grid-template-columns:repeat(4,1fr)} .row.c3{grid-template-columns:repeat(3,1fr)} .row.c2{grid-template-columns:repeat(2,1fr)}
@media(max-width:760px){.row.c4,.row.c3,.row.c2{grid-template-columns:1fr}}

.btn{display:inline-flex; align-items:center; gap:7px; padding:9px 15px; border-radius:var(--radius-s); border:1px solid var(--line2);
  background:rgba(47,143,255,.06); color:var(--txt); cursor:pointer; font-size:14px; transition:.15s;}
.btn:hover{border-color:var(--accent); background:rgba(47,143,255,.14)}
.btn-pri{background:linear-gradient(180deg,var(--accent),var(--accent-d)); border-color:transparent; color:#fff; font-weight:600}
.btn-pri:hover{filter:brightness(1.08)}
.btn-sm{padding:6px 11px; font-size:13px} .btn-ghost{background:transparent}
.btn-danger:hover{border-color:var(--bad); color:var(--bad); background:rgba(255,107,107,.08)}
.right{display:flex; justify-content:flex-end; gap:10px; margin-top:8px}
.themes{display:flex; gap:8px; flex-wrap:wrap}
.theme-chip{display:inline-flex; align-items:center; gap:7px; padding:7px 12px; border:1px solid var(--line2); border-radius:999px; background:transparent; color:var(--muted); cursor:pointer; font-size:13px; transition:.15s}
.theme-chip:hover{border-color:var(--accent); color:var(--txt)}
.theme-chip.active{border-color:var(--accent); background:rgba(47,143,255,.14); color:#fff}
.theme-chip .sw{width:13px; height:13px; border-radius:4px; display:inline-block}

table{width:100%; border-collapse:collapse; font-size:13.5px}
th{text-align:left; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--faint); padding:9px 10px; border-bottom:1px solid var(--line2)}
td{padding:10px; border-bottom:1px solid var(--line)}
tr:last-child td{border-bottom:none}
td.r,th.r{text-align:right} .num{font-variant-numeric:tabular-nums}
.empty{color:var(--faint); text-align:center; padding:22px}
.mini{font-size:12px;color:var(--muted)}

.lignes{border:1px solid var(--line2); border-radius:var(--radius-s); overflow:hidden; margin-top:6px}
.li-row{display:grid; grid-template-columns:1fr 84px 110px 92px 110px 34px; gap:8px; align-items:center; padding:8px 10px; border-bottom:1px solid var(--line)}
.li-row:last-child{border-bottom:none}
.li-row.head{background:rgba(47,143,255,.06); font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--faint)}
.li-row input,.li-row select{padding:7px 9px}
@media(max-width:760px){.li-row{grid-template-columns:1fr 60px 80px 70px 80px 30px; gap:5px}}

.totals{margin-top:12px; margin-left:auto; width:min(320px,100%)}
.totals .l{display:flex; justify-content:space-between; padding:5px 0; color:var(--muted)}
.totals .l.big{border-top:1px solid var(--line2); margin-top:5px; padding-top:9px; color:var(--txt); font-weight:800; font-size:16px}

.drop{border:2px dashed var(--line2); border-radius:var(--radius); padding:26px; text-align:center; color:var(--muted); transition:.15s; cursor:pointer}
.drop.over{border-color:var(--accent); background:rgba(47,143,255,.08); color:var(--txt)}

/* toast + modal */
#toast{position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px); opacity:0; pointer-events:none;
  background:#0e1c34; border:1px solid var(--line2); color:var(--txt); padding:11px 18px; border-radius:12px; box-shadow:var(--shadow); transition:.25s; z-index:60; font-size:14px}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
.modal-bg{position:fixed; inset:0; background:rgba(4,8,16,.66); backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center; padding:20px; z-index:50}
.modal{background:var(--surface); border:1px solid var(--line2); border-radius:var(--radius); max-width:820px; width:100%; max-height:90dvh; overflow:auto; box-shadow:var(--shadow)}
.modal-h{display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--surface)}
.modal-b{padding:18px}
#yada-ver{position:fixed; left:12px; bottom:8px; font-size:11px; color:var(--faint); z-index:5}

@media(max-width:820px){
  .app{grid-template-columns:1fr}
  aside{position:static; height:auto; flex-direction:row; align-items:center; overflow-x:auto; padding:10px 12px}
  aside .nav-sec,aside .side-foot{display:none}
  main{padding:20px 14px 70px}
}

/* ---- Zone d'impression (facture PDF) ---- */
#print-area{display:none}
@media print{
  body{background:#fff}
  .app,#toast,#yada-ver,.modal-bg{display:none !important}
  #print-area{display:block !important}
}
.inv{--ia:#0a64d6; --ihbg:#eef4ff; --ihtx:#33507a; --iband:transparent; --ico:#0a64d6;
  color:#0b1220; font-size:13px; max-width:780px; margin:0 auto; padding:36px 40px; background:#fff; font-family:var(--sans)}
.inv .h{display:flex; justify-content:space-between; align-items:flex-start; border-bottom:2px solid var(--ia); padding-bottom:16px; margin-bottom:22px}
.inv .h .co{font-size:20px; font-weight:800; color:var(--ico)}
.inv .h .ti{text-align:right}
.inv .h .ti .big{font-size:22px; font-weight:800}
.inv .parties{display:flex; justify-content:space-between; gap:20px; margin-bottom:20px}
.inv .parties .b{font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:#5a6b86}
.inv table{width:100%; border-collapse:collapse; font-size:12.5px}
.inv th{background:var(--ihbg); color:var(--ihtx); text-transform:uppercase; font-size:10.5px; padding:8px; text-align:left}
.inv th.r{text-align:right}
.inv td{border-bottom:1px solid #e3e9f2; padding:8px; color:#0b1220}
.inv .tot{margin-left:auto; width:260px; margin-top:14px}
.inv .tot .l{display:flex; justify-content:space-between; padding:4px 0}
.inv .tot .l.big{border-top:2px solid var(--ia); margin-top:5px; padding-top:8px; font-weight:800; font-size:15px}
.inv .foot{margin-top:26px; font-size:11px; color:#5a6b86; border-top:1px solid #e3e9f2; padding-top:10px}

/* Thèmes de facture */
.inv.th-emeraude{--ia:#059669; --ihbg:#e7f6ef; --ihtx:#1c6b50; --ico:#059669}
.inv.th-indigo{--ia:#6366f1; --ihbg:#ecedff; --ihtx:#4548b8; --ico:#6366f1}
.inv.th-minimal{--ia:#111827; --ihbg:#f3f4f6; --ihtx:#374151; --ico:#111827}
.inv.th-minimal .h .co{letter-spacing:.14em; text-transform:uppercase; font-size:16px}
.inv.th-minimal th{letter-spacing:.08em}
/* Thème « bandeau » : en-tête plein couleur */
.inv.th-bandeau{--ia:#1e3a8a; --ihbg:#e8ecfb; --ihtx:#26407e; padding:0}
.inv.th-bandeau .h{background:var(--ia); color:#fff; padding:26px 40px 22px; margin-bottom:0; border-bottom:none}
.inv.th-bandeau .h .co,.inv.th-bandeau .h .ti,.inv.th-bandeau .h .ti *{color:#fff}
.inv .body{display:contents}
.inv.th-bandeau .body{display:block; padding:24px 40px 36px}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div id="print-area"></div>
<div id="toast"></div>
<span id="yada-ver">YADA PRO · v0.1</span>

<script>
'use strict';
var VERSION='0.1.0';

/* ---------- Données (localStorage) ---------- */
function seed(){ return { contacts:[], emises:[], recues:[], seq:{fac:0} }; }
var db = load() || seed();
function load(){ try{ return JSON.parse(localStorage.getItem('yadapro')||'null'); }catch(e){ return null; } }
function save(){ try{ localStorage.setItem('yadapro', JSON.stringify(db)); return true; }catch(e){ return false; } }

/* ---------- Utilitaires ---------- */
function uid(){ return 'x'+Math.random().toString(36).slice(2,10); }
function r2(n){ return Math.round((+n||0)*100)/100; }
function eur(n){ return (r2(n)).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'; }
function todayStr(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function frDate(s){ if(!s) return '—'; var p=String(s).split('-'); return p.length===3? p[2]+'/'+p[1]+'/'+p[0] : s; }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toast._t); toast._t=setTimeout(function(){ t.classList.remove('show'); },2600); }
function nextNum(){ db.seq.fac=(db.seq.fac||0)+1; return 'FAC-'+new Date().getFullYear()+'-'+String(db.seq.fac).padStart(4,'0'); }
function contact(id){ return db.contacts.find(function(c){ return c.id===id; }); }

/* Thèmes d'habillage de la facture de vente */
var THEMES=[
  {id:'classique', nom:'Classique', col:'#0a64d6'},
  {id:'bandeau',   nom:'Bandeau',   col:'#1e3a8a'},
  {id:'emeraude',  nom:'Émeraude',  col:'#059669'},
  {id:'indigo',    nom:'Indigo',    col:'#6366f1'},
  {id:'minimal',   nom:'Minimal',   col:'#111827'}
];
var THEME_NOM={}; THEMES.forEach(function(t){ THEME_NOM[t.id]=t.nom; });
function themeChips(activeId, onclick){ return '<div class="themes">'+THEMES.map(function(t){
  return '<button type="button" class="theme-chip'+(t.id===activeId?' active':'')+'" onclick="'+onclick+'(\''+t.id+'\')"><span class="sw" style="background:'+t.col+'"></span>'+t.nom+'</button>'; }).join('')+'</div>'; }

/* ---------- Marque ---------- */
function yadaMark(px){ px=px||36; var id='g'+uid();
  return '<svg width="'+px+'" height="'+px+'" viewBox="0 0 48 48" style="border-radius:11px;box-shadow:0 6px 16px rgba(30,120,255,.35)">'
   +'<defs><linearGradient id="'+id+'" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5ab0ff"/><stop offset="1" stop-color="#0a64d6"/></linearGradient></defs>'
   +'<rect x="1" y="1" width="46" height="46" rx="13" fill="url(#'+id+')"/>'
   +'<path d="M14 14 L24 26 L34 14 M24 26 L24 35" fill="none" stroke="#fff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>'
   +'<circle cx="35.5" cy="33.5" r="3" fill="#24d17a"/></svg>'; }

/* ---------- Navigation ---------- */
var NAV=[
  {id:'dash', ico:'▦', label:'Tableau de bord'},
  {id:'emises', ico:'➤', label:'Envoyer'},
  {id:'recues', ico:'⇩', label:'Réceptionner'},
  {id:'contacts', ico:'☰', label:'Contacts'}
];
var current='dash';
function go(id){ current=id; if(id==='emises') emResetDraft(); render(); }

function sidebar(){
  var nRecuesTodo=db.recues.filter(function(r){ return r.statut!=='traitee'; }).length;
  var nav=NAV.map(function(m){
    var badge = m.id==='recues' && nRecuesTodo ? '<span class="badge">'+nRecuesTodo+'</span>' : '';
    return '<button class="nav-btn'+(m.id===current?' active':'')+'" onclick="go(\''+m.id+'\')"><span class="ico">'+m.ico+'</span>'+m.label+badge+'</button>';
  }).join('');
  return '<aside><div class="brand">'+yadaMark(36)+'<div><span class="name">YADA</span><span class="sub">PRO</span></div></div>'
    +'<div class="nav-sec">Factures</div>'+nav
    +'<div class="side-foot">Hub de factures · <b>v'+VERSION+'</b><br>Envoyer &amp; réceptionner.</div></aside>';
}

/* ---------- Tableau de bord ---------- */
function pageDash(){
  var em=db.emises, envoyees=em.filter(function(f){return f.statut==='envoyee';});
  var totTTC=em.reduce(function(a,f){return a+ (f.ttc||0);},0);
  var recuesTodo=db.recues.filter(function(r){return r.statut!=='traitee';});
  var recuesTot=db.recues.reduce(function(a,r){return a+(+r.montant||0);},0);
  return '<main>'+ph('Tableau de bord')
    +'<div class="grid g3">'
    +kpi('Factures émises', em.length+'', 'blue', envoyees.length+' envoyée(s)')
    +kpi('Total émis (TTC)', eur(totTTC), '', '')
    +kpi('Factures reçues', db.recues.length+'', 'warn', recuesTodo.length+' à traiter')
    +'</div>'
    +'<div class="grid g2" style="margin-top:16px">'
    +'<div class="card"><h2>Dernières factures envoyées</h2>'+miniListEmises(envoyees.slice(-5).reverse())+'</div>'
    +'<div class="card"><h2>À traiter (reçues)</h2>'+miniListRecues(recuesTodo.slice(-5).reverse())+'</div>'
    +'</div>'
    +'<div class="right" style="margin-top:16px"><button class="btn" onclick="go(\'recues\')">⇩ Réceptionner</button><button class="btn btn-pri" onclick="go(\'emises\')">➤ Envoyer une facture</button></div>'
    +'</main>';
}
function kpi(l,v,cls,sub){ return '<div class="card kpi"><div class="lbl">'+l+'</div><div class="val '+cls+'">'+v+'</div>'+(sub?'<div class="mini" style="margin-top:4px">'+sub+'</div>':'')+'</div>'; }
function miniListEmises(list){ if(!list.length) return '<div class="empty">Aucune facture envoyée.</div>';
  return '<table><tbody>'+list.map(function(f){ var c=contact(f.contactId);
    return '<tr><td><b>'+esc(f.numero)+'</b></td><td>'+esc(c?c.nom:'—')+'</td><td class="r num">'+eur(f.ttc)+'</td></tr>';}).join('')+'</tbody></table>'; }
function miniListRecues(list){ if(!list.length) return '<div class="empty">Rien à traiter. 👍</div>';
  return '<table><tbody>'+list.map(function(r){ return '<tr><td>'+esc(r.fournisseur||'—')+'</td><td class="mini">'+frDate(r.date)+'</td><td class="r num">'+eur(r.montant)+'</td></tr>';}).join('')+'</tbody></table>'; }

function ph(t,right){ return '<div class="page-head"><h1>'+t+'</h1><div class="spacer"></div>'+(right||'')+'</div>'; }

/* ============================================================
   ENVOYER — création + liste des factures émises
   ============================================================ */
var emDraft=null;
function emResetDraft(){ emDraft={ contactId:(db.contacts.find(function(c){return c.type!=='fournisseur';})||{}).id||'', date:todayStr(), ech:todayStr(), theme:'classique', lignes:[{desc:'',qte:1,pu:0,taux:20}] }; }
function emSetTheme(id){ emSync(); emDraft.theme=id; render(); }
function emTotaux(){ var ht=0,tva=0; (emDraft.lignes||[]).forEach(function(l){ var b=r2((+l.qte||0)*(+l.pu||0)); ht+=b; tva+=b*(+l.taux||0)/100; }); ht=r2(ht); tva=r2(tva); return {ht:ht,tva:tva,ttc:r2(ht+tva)}; }
function emSync(){ (emDraft.lignes||[]).forEach(function(l,i){
  var d=document.getElementById('em-desc-'+i), q=document.getElementById('em-qte-'+i), p=document.getElementById('em-pu-'+i), t=document.getElementById('em-taux-'+i);
  if(d)l.desc=d.value; if(q)l.qte=q.value; if(p)l.pu=p.value; if(t)l.taux=t.value; });
  var ci=document.getElementById('em-contact'), dt=document.getElementById('em-date'), ec=document.getElementById('em-ech');
  if(ci)emDraft.contactId=ci.value; if(dt)emDraft.date=dt.value; if(ec)emDraft.ech=ec.value; }
function emMaj(){ emSync(); var t=emTotaux();
  (emDraft.lignes||[]).forEach(function(l,i){ var el=document.getElementById('em-lt-'+i); if(el) el.textContent=eur(r2((+l.qte||0)*(+l.pu||0))); });
  var box=document.getElementById('em-totals'); if(box) box.innerHTML=emTotalsHTML(t); }
function emAddLigne(){ emSync(); emDraft.lignes.push({desc:'',qte:1,pu:0,taux:20}); render(); }
function emDelLigne(i){ emSync(); emDraft.lignes.splice(i,1); if(!emDraft.lignes.length) emDraft.lignes.push({desc:'',qte:1,pu:0,taux:20}); render(); }
function emTotalsHTML(t){ return '<div class="l"><span>Total HT</span><span class="num">'+eur(t.ht)+'</span></div>'
  +'<div class="l"><span>TVA</span><span class="num">'+eur(t.tva)+'</span></div>'
  +'<div class="l big"><span>Total TTC</span><span class="num">'+eur(t.ttc)+'</span></div>'; }

function pageEmises(){
  if(!emDraft) emResetDraft();
  var clients=db.contacts.filter(function(c){return c.type!=='fournisseur';});
  var t=emTotaux();
  var opts = clients.length ? clients.map(function(c){return '<option value="'+c.id+'"'+(c.id===emDraft.contactId?' selected':'')+'>'+esc(c.nom)+'</option>';}).join('')
    : '<option value="">— aucun client —</option>';
  var lignes=(emDraft.lignes||[]).map(function(l,i){ return '<div class="li-row">'
    +'<input id="em-desc-'+i+'" value="'+esc(l.desc)+'" placeholder="Désignation" oninput="emMaj()">'
    +'<input id="em-qte-'+i+'" type="number" step="any" value="'+esc(l.qte)+'" oninput="emMaj()">'
    +'<input id="em-pu-'+i+'" type="number" step="any" value="'+esc(l.pu)+'" placeholder="PU HT" oninput="emMaj()">'
    +'<select id="em-taux-'+i+'" onchange="emMaj()">'+[20,10,5.5,0].map(function(x){return '<option'+(x==l.taux?' selected':'')+'>'+x+'</option>';}).join('')+'</select>'
    +'<div class="num" id="em-lt-'+i+'" style="text-align:right;color:var(--muted)">'+eur(r2((+l.qte||0)*(+l.pu||0)))+'</div>'
    +'<button class="btn btn-ghost btn-sm" title="Retirer" onclick="emDelLigne('+i+')">✕</button></div>'; }).join('');

  var form='<div class="card"><h2>Nouvelle facture à envoyer</h2>'
    +'<div class="row c3">'
    +'<div class="field"><label>Client destinataire</label><select id="em-contact">'+opts+'</select></div>'
    +'<div class="field"><label>Date</label><input id="em-date" type="date" value="'+esc(emDraft.date)+'"></div>'
    +'<div class="field"><label>Échéance</label><input id="em-ech" type="date" value="'+esc(emDraft.ech)+'"></div>'
    +'</div>'
    +(clients.length?'':'<div class="mini" style="color:var(--warn);margin-bottom:8px">Ajoutez d\'abord un client dans <b>Contacts</b>.</div>')
    +'<div class="field"><label>Thème de la facture</label>'+themeChips(emDraft.theme||'classique','emSetTheme')+'</div>'
    +'<label>Lignes</label><div class="lignes"><div class="li-row head"><div>Désignation</div><div>Qté</div><div>PU HT</div><div>TVA %</div><div style="text-align:right">Total HT</div><div></div></div>'+lignes+'</div>'
    +'<div style="margin-top:8px"><button class="btn btn-sm" onclick="emAddLigne()">+ Ajouter une ligne</button></div>'
    +'<div class="totals" id="em-totals">'+emTotalsHTML(t)+'</div>'
    +'<div class="right"><button class="btn btn-pri" onclick="emCreer()">Créer la facture</button></div>'
    +'</div>';

  return '<main>'+ph('Envoyer une facture')+ form + emListe() +'</main>';
}
function emCreer(){ emSync();
  if(!emDraft.contactId) return toast('Sélectionnez un client (onglet Contacts).');
  var t=emTotaux(); if(t.ht<=0) return toast('Renseignez au moins une ligne.');
  var f={ id:uid(), numero:nextNum(), contactId:emDraft.contactId, date:emDraft.date, ech:emDraft.ech,
    lignes:JSON.parse(JSON.stringify(emDraft.lignes)).filter(function(l){return (l.desc&&String(l.desc).trim())||r2((+l.qte||0)*(+l.pu||0))!==0;}),
    theme:emDraft.theme||'classique', ht:t.ht, tva:t.tva, ttc:t.ttc, statut:'brouillon', cree:Date.now(), dateEnvoi:null };
  db.emises.push(f); save(); emResetDraft(); render();
  toast('Facture '+f.numero+' créée. Aperçu / envoi disponibles ci-dessous.');
}
function emListe(){
  var list=db.emises.slice().sort(function(a,b){return b.cree-a.cree;});
  var rows=list.map(function(f){ var c=contact(f.contactId);
    var tg = f.statut==='envoyee' ? '<span class="tag t-sent">envoyée</span>' : '<span class="tag t-draft">brouillon</span>';
    return '<tr><td><b>'+esc(f.numero)+'</b></td><td>'+esc(c?c.nom:'—')+'</td><td class="num">'+frDate(f.date)+'</td>'
      +'<td class="r num">'+eur(f.ttc)+'</td><td>'+tg+(f.dateEnvoi?' <span class="mini">'+frDate(f.dateEnvoi)+'</span>':'')+'</td>'
      +'<td class="r" style="white-space:nowrap">'
      +'<button class="btn btn-ghost btn-sm" onclick="emApercu(\''+f.id+'\')">Aperçu</button> '
      +'<button class="btn btn-sm" onclick="emImprimer(\''+f.id+'\')">PDF</button> '
      +'<button class="btn btn-pri btn-sm" onclick="emEnvoyer(\''+f.id+'\')">✉ Envoyer</button></td></tr>'; }).join('');
  return '<div class="card" style="margin-top:16px"><h2>Factures émises ('+list.length+')</h2>'
    +'<div style="overflow-x:auto"><table><thead><tr><th>Numéro</th><th>Client</th><th>Date</th><th class="r">TTC</th><th>Statut</th><th class="r">Actions</th></tr></thead>'
    +'<tbody>'+(rows||'<tr><td colspan="6" class="empty">Aucune facture émise.</td></tr>')+'</tbody></table></div></div>';
}

/* Facture imprimable (aperçu / PDF) */
function factureHTML(f){ var c=contact(f.contactId)||{}; var th=f.theme||'classique';
  var lignes=(f.lignes||[]).map(function(l){ var b=r2((+l.qte||0)*(+l.pu||0));
    return '<tr><td>'+esc(l.desc||'')+'</td><td class="r num">'+(l.qte||'')+'</td><td class="r num">'+eur(l.pu)+'</td><td class="r num">'+(l.taux||0)+' %</td><td class="r num">'+eur(b)+'</td></tr>'; }).join('');
  return '<div class="inv th-'+th+'"><div class="h"><div class="co">YADA PRO</div>'
    +'<div class="ti"><div class="big">FACTURE</div><div>'+esc(f.numero)+'</div><div class="mini">Date : '+frDate(f.date)+'</div><div class="mini">Échéance : '+frDate(f.ech)+'</div></div></div>'
    +'<div class="body">'
    +'<div class="parties"><div><div class="b">Émetteur</div><div><b>YADA PRO</b></div></div>'
    +'<div style="text-align:right"><div class="b">Client</div><div><b>'+esc(c.nom||'—')+'</b></div>'+(c.email?'<div class="mini">'+esc(c.email)+'</div>':'')+'</div></div>'
    +'<table><thead><tr><th>Désignation</th><th class="r">Qté</th><th class="r">PU HT</th><th class="r">TVA</th><th class="r">Total HT</th></tr></thead><tbody>'+lignes+'</tbody></table>'
    +'<div class="tot"><div class="l"><span>Total HT</span><span class="num">'+eur(f.ht)+'</span></div>'
    +'<div class="l"><span>TVA</span><span class="num">'+eur(f.tva)+'</span></div>'
    +'<div class="l big"><span>Total TTC</span><span class="num">'+eur(f.ttc)+'</span></div></div>'
    +'<div class="foot">Facture générée par YADA PRO — thème « '+esc(THEME_NOM[th]||th)+' ». Merci de votre confiance.</div>'
    +'</div></div>';
}
function emApercu(id){ var f=db.emises.find(function(x){return x.id===id;}); if(!f)return;
  var bar='<div class="field"><label>Thème</label><div class="themes">'+THEMES.map(function(t){
    return '<button type="button" class="theme-chip'+(t.id===(f.theme||'classique')?' active':'')+'" onclick="emApercuTheme(\''+f.id+'\',\''+t.id+'\')"><span class="sw" style="background:'+t.col+'"></span>'+t.nom+'</button>'; }).join('')+'</div></div>';
  openModal('Aperçu — '+esc(f.numero), bar+'<div style="background:#fff;border-radius:10px;overflow:hidden">'+factureHTML(f)+'</div>',
    '<button class="btn btn-sm" onclick="emImprimer(\''+f.id+'\')">Imprimer / PDF</button><button class="btn btn-pri btn-sm" onclick="emEnvoyer(\''+f.id+'\')">✉ Envoyer</button>'); }
function emApercuTheme(id,th){ var f=db.emises.find(function(x){return x.id===id;}); if(!f)return; f.theme=th; save(); closeModal(); emApercu(id); render(); }
function emImprimer(id){ var f=db.emises.find(function(x){return x.id===id;}); if(!f)return;
  document.getElementById('print-area').innerHTML=factureHTML(f); window.print(); }
function emEnvoyer(id){ var f=db.emises.find(function(x){return x.id===id;}); if(!f)return; var c=contact(f.contactId)||{};
  if(!c.email){ toast('Ce client n\'a pas d\'e-mail (onglet Contacts).'); }
  var sujet='Facture '+f.numero+' — '+eur(f.ttc);
  var corps='Bonjour '+(c.nom||'')+',%0D%0A%0D%0AVeuillez trouver la facture '+f.numero+' d\'un montant de '+eur(f.ttc).replace('€','EUR')+'.%0D%0A(Pensez à joindre le PDF : bouton « PDF » dans YADA PRO.)%0D%0A%0D%0ACordialement,';
  f.statut='envoyee'; f.dateEnvoi=todayStr(); save();
  window.location.href='mailto:'+encodeURIComponent(c.email||'')+'?subject='+encodeURIComponent(sujet)+'&body='+corps;
  closeModal(); render(); toast('Facture '+f.numero+' marquée envoyée — e-mail ouvert.');
}

/* ============================================================
   RÉCEPTIONNER — dépôt / liste des factures reçues
   ============================================================ */
function pageRecues(){
  var list=db.recues.slice().sort(function(a,b){return b.cree-a.cree;});
  var rows=list.map(function(r){
    var tg = r.statut==='traitee' ? '<span class="tag t-done">traitée</span>' : '<span class="tag t-todo">à traiter</span>';
    var voir = r.fichier ? '<button class="btn btn-ghost btn-sm" onclick="recVoir(\''+r.id+'\')">Voir</button> ' : '';
    var mark = r.statut==='traitee' ? '<button class="btn btn-ghost btn-sm" onclick="recStatut(\''+r.id+'\',\'todo\')">Rouvrir</button>'
                                    : '<button class="btn btn-pri btn-sm" onclick="recStatut(\''+r.id+'\',\'traitee\')">Marquer traitée</button>';
    return '<tr><td>'+esc(r.fournisseur||'—')+(r.nomFichier?'<div class="mini">'+esc(r.nomFichier)+'</div>':'')+'</td>'
      +'<td class="num">'+frDate(r.date)+'</td><td class="r num">'+eur(r.montant)+'</td><td>'+tg+'</td>'
      +'<td class="r" style="white-space:nowrap">'+voir+mark+' <button class="btn btn-ghost btn-sm btn-danger" onclick="recSuppr(\''+r.id+'\')">✕</button></td></tr>'; }).join('');
  return '<main>'+ph('Réceptionner une facture')
    +'<div class="grid g2">'
    +'<div class="card"><h2>Déposer une facture reçue</h2>'
    +'<div class="drop" id="drop" onclick="document.getElementById(\'rec-file\').click()">📎 Glissez un PDF / une photo ici, ou <b>cliquez pour choisir</b>.<div class="mini" style="margin-top:6px">Le fichier reste sur cet appareil (hors-ligne).</div></div>'
    +'<input id="rec-file" type="file" accept="application/pdf,image/*" style="display:none" onchange="recFichier(this)">'
    +'<div class="row c2" style="margin-top:12px"><div class="field"><label>Fournisseur</label><input id="rec-four" placeholder="Nom du fournisseur"></div>'
    +'<div class="field"><label>Date</label><input id="rec-date" type="date" value="'+todayStr()+'"></div></div>'
    +'<div class="field"><label>Montant TTC (€)</label><input id="rec-mont" type="number" step="any" placeholder="0,00"></div>'
    +'<div class="mini" id="rec-fname" style="margin-bottom:8px"></div>'
    +'<div class="right"><button class="btn btn-pri" onclick="recAjouter()">Réceptionner</button></div></div>'
    +'<div class="card"><h2>Résumé</h2>'
    +kpiInline('Reçues', db.recues.length)+kpiInline('À traiter', db.recues.filter(function(x){return x.statut!=='traitee';}).length)
    +kpiInline('Total TTC reçu', eur(db.recues.reduce(function(a,x){return a+(+x.montant||0);},0)))
    +'</div></div>'
    +'<div class="card" style="margin-top:16px"><h2>Boîte de réception ('+list.length+')</h2>'
    +'<div style="overflow-x:auto"><table><thead><tr><th>Fournisseur</th><th>Date</th><th class="r">TTC</th><th>Statut</th><th class="r">Actions</th></tr></thead>'
    +'<tbody>'+(rows||'<tr><td colspan="5" class="empty">Aucune facture reçue.</td></tr>')+'</tbody></table></div></div>'
    +'</main>';
}
function kpiInline(l,v){ return '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line)"><span class="mini">'+l+'</span><b class="num">'+v+'</b></div>'; }
var recPending=null; /* {nomFichier, fichier(dataURL|null)} */
function recFichier(input){ var file=input.files&&input.files[0]; if(!file)return;
  var fn=document.getElementById('rec-fname'); fn.textContent='Lecture de « '+file.name+' »…';
  var rd=new FileReader();
  rd.onload=function(){ recPending={ nomFichier:file.name, fichier:(file.size<1500000? rd.result : null) };
    fn.innerHTML='Fichier : <b>'+esc(file.name)+'</b>'+(recPending.fichier?'':' <span style="color:var(--warn)">(trop volumineux : non conservé, seules les infos seront enregistrées)</span>'); };
  rd.onerror=function(){ recPending={ nomFichier:file.name, fichier:null }; fn.textContent='Fichier : '+file.name+' (aperçu indisponible)'; };
  rd.readAsDataURL(file);
}
function recAjouter(){
  var four=(document.getElementById('rec-four').value||'').trim();
  var date=document.getElementById('rec-date').value||todayStr();
  var mont=+document.getElementById('rec-mont').value||0;
  if(!four && !recPending) return toast('Indiquez au moins un fournisseur ou un fichier.');
  var r={ id:uid(), fournisseur:four, date:date, montant:r2(mont), statut:'todo', cree:Date.now(),
    nomFichier:recPending?recPending.nomFichier:null, fichier:recPending?recPending.fichier:null };
  db.recues.push(r);
  if(!save()){ r.fichier=null; save(); toast('Enregistré, mais le fichier était trop volumineux pour le stockage local.'); }
  else toast('Facture reçue enregistrée.');
  recPending=null; render();
}
function recStatut(id,st){ var r=db.recues.find(function(x){return x.id===id;}); if(!r)return; r.statut=(st==='traitee'?'traitee':'todo'); save(); render(); }
function recSuppr(id){ if(!confirm('Supprimer cette facture reçue ?'))return; db.recues=db.recues.filter(function(x){return x.id!==id;}); save(); render(); }
function recVoir(id){ var r=db.recues.find(function(x){return x.id===id;}); if(!r||!r.fichier)return; var w=window.open(); if(w){ w.document.write('<title>'+esc(r.nomFichier||'facture')+'</title><iframe src="'+r.fichier+'" style="border:0;width:100%;height:100vh"></iframe>'); } }

/* Glisser-déposer */
function bindDrop(){ var d=document.getElementById('drop'); if(!d)return;
  ['dragenter','dragover'].forEach(function(e){ d.addEventListener(e,function(ev){ ev.preventDefault(); d.classList.add('over'); }); });
  ['dragleave','drop'].forEach(function(e){ d.addEventListener(e,function(ev){ ev.preventDefault(); d.classList.remove('over'); }); });
  d.addEventListener('drop',function(ev){ var f=ev.dataTransfer&&ev.dataTransfer.files&&ev.dataTransfer.files[0]; if(f){ var inp=document.getElementById('rec-file'); var dt=new DataTransfer(); dt.items.add(f); inp.files=dt.files; recFichier(inp); } });
}

/* ============================================================
   CONTACTS
   ============================================================ */
function pageContacts(){
  var rows=db.contacts.slice().sort(function(a,b){return (a.nom||'').localeCompare(b.nom||'');}).map(function(c){
    return '<tr><td><b>'+esc(c.nom)+'</b></td><td>'+(c.type==='fournisseur'?'Fournisseur':'Client')+'</td><td>'+esc(c.email||'—')+'</td>'
      +'<td class="r"><button class="btn btn-ghost btn-sm btn-danger" onclick="contactSuppr(\''+c.id+'\')">✕</button></td></tr>'; }).join('');
  return '<main>'+ph('Contacts')
    +'<div class="grid g2">'
    +'<div class="card"><h2>Ajouter un contact</h2>'
    +'<div class="field"><label>Nom</label><input id="ct-nom" placeholder="Nom / raison sociale"></div>'
    +'<div class="row c2"><div class="field"><label>Type</label><select id="ct-type"><option value="client">Client (à qui j\'envoie)</option><option value="fournisseur">Fournisseur (de qui je reçois)</option></select></div>'
    +'<div class="field"><label>E-mail</label><input id="ct-mail" type="email" placeholder="email@exemple.fr"></div></div>'
    +'<div class="right"><button class="btn btn-pri" onclick="contactAjouter()">Ajouter</button></div></div>'
    +'<div class="card"><h2>Répertoire ('+db.contacts.length+')</h2>'
    +'<div style="overflow-x:auto"><table><thead><tr><th>Nom</th><th>Type</th><th>E-mail</th><th></th></tr></thead>'
    +'<tbody>'+(rows||'<tr><td colspan="4" class="empty">Aucun contact.</td></tr>')+'</tbody></table></div></div>'
    +'</div></main>';
}
function contactAjouter(){ var nom=(document.getElementById('ct-nom').value||'').trim();
  if(!nom) return toast('Indiquez un nom.');
  db.contacts.push({ id:uid(), nom:nom, type:document.getElementById('ct-type').value, email:(document.getElementById('ct-mail').value||'').trim() });
  save(); render(); toast('Contact ajouté.');
}
function contactSuppr(id){ db.contacts=db.contacts.filter(function(c){return c.id!==id;}); save(); render(); }

/* ---------- Modale ---------- */
function openModal(title,body,actions){ var bg=document.createElement('div'); bg.className='modal-bg'; bg.id='modal-bg';
  bg.onclick=function(e){ if(e.target===bg) closeModal(); };
  bg.innerHTML='<div class="modal"><div class="modal-h"><b>'+title+'</b><button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button></div>'
    +'<div class="modal-b">'+body+'</div><div class="modal-h" style="border-top:1px solid var(--line);border-bottom:none;justify-content:flex-end;gap:8px">'+(actions||'')+'</div></div>';
  document.body.appendChild(bg);
}
function closeModal(){ var m=document.getElementById('modal-bg'); if(m)m.remove(); }

/* ---------- Rendu ---------- */
var PAGES={ dash:pageDash, emises:pageEmises, recues:pageRecues, contacts:pageContacts };
function render(){ document.getElementById('app').innerHTML=sidebar()+(PAGES[current]||pageDash)(); if(current==='recues') bindDrop(); }

if('serviceWorker' in navigator){ window.addEventListener('load',function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); }); }
save(); render();
</script>
</body>
</html>
