<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a1120">
<meta name="yada-version" content="1.2.0">
<title>YADA 1.2</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
/* ============================================================
   YADA 1.2 — fondation propre (nouveau départ)
   Application mono-fichier, autonome, hors-ligne.
   Thème : bleu nuit + bleu Crystal. Prête à recevoir les modules.
   ============================================================ */
:root{
  --bg:#0a1120; --bg2:#0d1526;
  --surface:#111c30; --surface2:#0f1830;
  --line:rgba(120,160,220,.14); --line2:rgba(120,160,220,.22);
  --txt:#e6eefc; --muted:#9fb2d0; --faint:#6f83a6;
  --accent:#2f8fff; --accent2:#5ab0ff; --accent-d:#0a64d6;
  --good:#24d17a;
  --radius:14px; --radius-s:10px;
  --shadow:0 10px 30px rgba(0,0,0,.35);
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font-family:var(--sans); color:var(--txt); line-height:1.5;
  background:
    radial-gradient(1100px 620px at 82% -8%, rgba(47,143,255,.16), transparent 60%),
    radial-gradient(900px 560px at -6% 108%, rgba(90,176,255,.10), transparent 55%),
    linear-gradient(180deg,#0a1120,#0b1322 40%,#0a1120);
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}
a{color:var(--accent2);text-decoration:none}
code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; font-size:.92em; color:var(--accent2)}

/* ---- Coquille applicative : barre latérale + contenu ---- */
.app{display:grid; grid-template-columns:248px 1fr; min-height:100dvh}
aside{
  position:sticky; top:0; height:100dvh; overflow:hidden;
  display:flex; flex-direction:column; gap:6px; padding:20px 16px;
  background:linear-gradient(180deg,rgba(16,32,66,.55),rgba(9,16,34,.7));
  backdrop-filter:blur(18px) saturate(1.3);
  border-right:1px solid var(--line);
}
.brand{display:flex; align-items:center; gap:11px; padding:4px 6px 14px}
.brand .mark{flex:0 0 auto;border-radius:12px;box-shadow:0 6px 16px rgba(30,120,255,.35)}
.brand .name{font-weight:800; font-size:20px; letter-spacing:.04em}
.brand .sub{display:block; font-size:11px; font-weight:600; color:var(--accent2); letter-spacing:.16em}
.nav-sec{font-size:11px; letter-spacing:.14em; color:var(--faint); text-transform:uppercase; margin:14px 8px 6px}
.nav-btn{
  display:flex; align-items:center; gap:10px; width:100%; text-align:left;
  padding:10px 12px; border-radius:var(--radius-s); border:1px solid transparent;
  background:transparent; color:var(--muted); font:inherit; font-size:14px; cursor:pointer;
  transition:background .15s,color .15s,border-color .15s;
}
.nav-btn:hover{background:rgba(47,143,255,.10); color:var(--txt)}
.nav-btn.active{
  background:linear-gradient(180deg,rgba(47,143,255,.22),rgba(47,143,255,.10));
  border-color:rgba(47,143,255,.5); color:#fff;
  box-shadow:0 0 0 1px rgba(47,143,255,.25) inset, 0 0 18px rgba(47,143,255,.25);
}
.nav-btn .ico{width:18px; text-align:center; opacity:.9}
.nav-placeholder{margin:6px 8px; padding:12px; border:1px dashed var(--line2); border-radius:var(--radius-s); color:var(--faint); font-size:12.5px}
.side-foot{margin-top:auto; padding-top:12px; border-top:1px solid var(--line); color:var(--faint); font-size:11.5px}
.side-foot b{color:var(--muted)}

main{padding:34px clamp(18px,4vw,56px); min-width:0}
.page-head{display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; margin-bottom:22px}
.page-head h1{margin:0; font-size:26px; letter-spacing:.01em; text-wrap:balance}
.badge{font-size:12px; font-weight:700; color:var(--accent2); border:1px solid var(--line2); padding:3px 10px; border-radius:999px; background:rgba(47,143,255,.08)}

.grid{display:grid; gap:18px}
.g2{grid-template-columns:repeat(2,1fr)}
@media(max-width:900px){.g2{grid-template-columns:1fr}}

.card{
  background:linear-gradient(180deg,var(--surface),var(--surface2));
  border:1px solid var(--line); border-radius:var(--radius); padding:22px 24px; box-shadow:var(--shadow);
}
.card h2{margin:0 0 6px; font-size:16px; letter-spacing:.01em}
.card p{margin:0 0 10px; color:var(--muted); font-size:14.5px}
.card ul{margin:8px 0 0; padding-left:18px; color:var(--muted); font-size:14px}
.card li{margin:5px 0}
.card li b{color:var(--txt)}

.hero{
  position:relative; overflow:hidden; background-color:#0f1a30;
  background-image:
    radial-gradient(600px 300px at 90% -20%, rgba(47,143,255,.22), transparent 60%),
    linear-gradient(180deg,#12203a,#0f1830);
}
.hero .eyebrow{font-size:12px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--accent2)}
.hero h2{font-size:24px; margin:8px 0 8px}
.hero .lead{font-size:15px; color:var(--muted); max-width:62ch}
.pill-row{display:flex; gap:10px; flex-wrap:wrap; margin-top:16px}
.pill{font-size:12.5px; color:var(--txt); border:1px solid var(--line2); background:rgba(47,143,255,.08); padding:6px 12px; border-radius:999px}

.foot{margin-top:26px; color:var(--faint); font-size:12.5px}
#yada-ver{position:fixed; left:12px; bottom:10px; font-size:11px; color:var(--faint); letter-spacing:.03em; z-index:5}

@media(max-width:820px){
  .app{grid-template-columns:1fr}
  aside{position:static; height:auto; flex-direction:row; align-items:center; gap:14px; overflow-x:auto; padding:12px 14px}
  aside .nav-sec,aside .nav-placeholder,aside .side-foot{display:none}
  .brand{padding:0}
  main{padding:22px 16px 70px}
}
</style>
</head>
<body>
<div class="app" id="app"><!-- rendu par render() --></div>
<span id="yada-ver">YADA 1.2 · build 1</span>

<script>
/* ============================================================
   YADA 1.2 — noyau applicatif minimal (fondation)
   - render() + `current` : routeur simple prêt à accueillir les modules
   - db + save()/load() : persistance localStorage (stub)
   Aucun module métier n'est encore branché : nouveau départ propre.
   ============================================================ */
'use strict';
var VERSION = '1.2.0';

/* Persistance locale (stub, prête pour les futurs modules) */
var db = load() || { meta:{ version:VERSION, cree:Date.now() } };
function load(){ try{ return JSON.parse(localStorage.getItem('yada12')||'null'); }catch(e){ return null; } }
function save(){ try{ localStorage.setItem('yada12', JSON.stringify(db)); }catch(e){} }

/* Identité visuelle : icône YADA (dégradé bleu Crystal + Y blanc + point vert) */
function yadaMark(px){
  px = px||40;
  var id = 'yg'+Math.random().toString(36).slice(2,7);
  return '<svg class="mark" width="'+px+'" height="'+px+'" viewBox="0 0 48 48" aria-hidden="true">'
    + '<defs><linearGradient id="'+id+'" x1="0" y1="0" x2="1" y2="1">'
    + '<stop offset="0" stop-color="#5ab0ff"/><stop offset="1" stop-color="#0a64d6"/></linearGradient></defs>'
    + '<rect x="1" y="1" width="46" height="46" rx="13" fill="url(#'+id+')"/>'
    + '<path d="M14 14 L24 26 L34 14 M24 26 L24 35" fill="none" stroke="#fff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>'
    + '<circle cx="35.5" cy="33.5" r="3" fill="#24d17a"/></svg>';
}

/* Modules (vide pour l'instant : à définir ensemble) */
var MODULES = []; // ex. futur : {id:'accueil', ico:'▦', label:'Accueil'}
var current = 'accueil';

function sidebar(){
  var nav = MODULES.length
    ? MODULES.map(function(m){
        return '<button class="nav-btn'+(m.id===current?' active':'')+'" onclick="go(\''+m.id+'\')">'
          + '<span class="ico">'+(m.ico||'•')+'</span>'+m.label+'</button>'; }).join('')
    : '<div class="nav-placeholder">Aucun module pour l\'instant.<br>À construire ensemble.</div>';
  return '<aside>'
    + '<div class="brand">'+yadaMark(40)
    + '<div><span class="name">YADA</span><span class="sub">1.2</span></div></div>'
    + '<div class="nav-sec">Modules</div>'
    + nav
    + '<div class="side-foot">Fondation propre · <b>v'+VERSION+'</b><br>Prête à construire.</div>'
    + '</aside>';
}

function pageAccueil(){
  return '<main>'
    + '<div class="page-head"><h1>Nouveau départ</h1><span class="badge">YADA 1.2</span></div>'
    + '<div class="grid g2">'
    + '<div class="card hero" style="grid-column:1 / -1">'
    +   '<div class="eyebrow">Fondation</div>'
    +   '<h2>YADA 1.2 — une base propre, prête à construire.</h2>'
    +   '<p class="lead">Le code accumulé des versions précédentes a été archivé et retiré. '
    +      'Cette base est volontairement minimale : identité visuelle, coquille applicative '
    +      '(barre latérale + zone de contenu), routeur et persistance locale. '
    +      'On ajoute les modules un par un, proprement.</p>'
    +   '<div class="pill-row">'
    +     '<span class="pill">Mono-fichier · hors-ligne</span>'
    +     '<span class="pill">Bleu nuit + Crystal</span>'
    +     '<span class="pill">Architecture render() modulaire</span>'
    +     '<span class="pill">PWA installable</span>'
    +   '</div>'
    + '</div>'
    + '<div class="card"><h2>Ce qui est en place</h2>'
    +   '<ul>'
    +     '<li><b>Identité YADA</b> — logo, palette, typographie</li>'
    +     '<li><b>Coquille</b> — barre latérale + contenu responsive</li>'
    +     '<li><b>Noyau</b> — <code>render()</code> + <code>current</code> (routeur) + <code>db</code>/<code>save()</code></li>'
    +     '<li><b>PWA</b> — manifest + service worker (installable, hors-ligne)</li>'
    +   '</ul></div>'
    + '<div class="card"><h2>Prochaines étapes</h2>'
    +   '<ul>'
    +     '<li>Définir le <b>premier module</b> à construire</li>'
    +     '<li>Choisir le <b>périmètre</b> de YADA 1.2</li>'
    +     '<li>Rebrancher, au besoin, des briques de l’archive <b>v494</b></li>'
    +   '</ul></div>'
    + '</div>'
    + '<div class="foot">YADA 1.2 · build 1 — fondation. L’historique complet (494 versions) est sauvegardé.</div>'
    + '</main>';
}

var PAGES = { accueil: pageAccueil };

function go(id){ current = id; render(); }

function render(){
  var body = (PAGES[current] || pageAccueil)();
  document.getElementById('app').innerHTML = sidebar() + body;
}

/* Service worker (PWA) */
if('serviceWorker' in navigator){ window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); }); }

save();
render();
</script>
</body>
</html>
