<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a1120">
<meta name="yada-version" content="0.9.0">
<title>YADA PRO</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
/* ============================================================
   YADA PRO — hub de factures (envoyer / réceptionner)
   Application mono-fichier, autonome, hors-ligne (PWA).
   ============================================================ */
:root{
  --bg:#0a1120; --surface:#111c30; --surface2:#0f1830;
  --line:rgba(120,160,220,.14); --line2:rgba(120,160,220,.24);
  --txt:#e6eefc; --muted:#9fb2d0; --faint:#6f83a6;
  --accent:#2f8fff; --accent2:#5ab0ff; --accent-d:#0a64d6;
  --good:#24d17a; --warn:#f4b740; --bad:#ff6b6b;
  --radius:14px; --radius-s:10px; --shadow:0 10px 30px rgba(0,0,0,.35);
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:var(--sans); color:var(--txt); line-height:1.5;
  background:radial-gradient(1100px 620px at 82% -8%, rgba(47,143,255,.16), transparent 60%),
             radial-gradient(900px 560px at -6% 108%, rgba(90,176,255,.10), transparent 55%),
             linear-gradient(180deg,#0a1120,#0b1322 40%,#0a1120);
  -webkit-font-smoothing:antialiased;}
a{color:var(--accent2);text-decoration:none}
button{font:inherit}

/* coquille */
.app{display:grid; grid-template-columns:242px 1fr; min-height:100dvh}
aside{position:sticky; top:0; height:100dvh; overflow:auto; display:flex; flex-direction:column; gap:4px; padding:20px 14px;
  background:linear-gradient(180deg,rgba(16,32,66,.55),rgba(9,16,34,.7)); backdrop-filter:blur(18px) saturate(1.3); border-right:1px solid var(--line);}
.brand{display:flex; align-items:center; gap:11px; padding:4px 6px 14px}
.brand .name{font-weight:800; font-size:19px; letter-spacing:.04em}
.brand .sub{display:block; font-size:11px; font-weight:700; color:var(--accent2); letter-spacing:.18em}
.nav-sec{font-size:11px; letter-spacing:.14em; color:var(--faint); text-transform:uppercase; margin:14px 8px 6px}
.nav-btn{display:flex; align-items:center; gap:10px; width:100%; text-align:left; padding:10px 12px; border-radius:var(--radius-s);
  border:1px solid transparent; background:transparent; color:var(--muted); font-size:14px; cursor:pointer; transition:.15s;}
.nav-btn:hover{background:rgba(47,143,255,.10); color:var(--txt)}
.nav-btn.active{background:linear-gradient(180deg,rgba(47,143,255,.22),rgba(47,143,255,.10)); border-color:rgba(47,143,255,.5); color:#fff; box-shadow:0 0 18px rgba(47,143,255,.22);}
.nav-btn .ico{width:18px; text-align:center}
.nav-btn .badge{margin-left:auto; font-size:11px; font-weight:700; background:rgba(47,143,255,.18); color:var(--accent2); border-radius:999px; padding:1px 8px}
.side-foot{margin-top:auto; padding-top:12px; border-top:1px solid var(--line); color:var(--faint); font-size:11.5px}

main{padding:30px clamp(16px,3.5vw,48px); min-width:0}
.page-head{display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-bottom:22px}
.page-head h1{margin:0; font-size:24px; text-wrap:balance}
.page-head .spacer{flex:1}
.tag{font-size:12px; font-weight:700; border-radius:999px; padding:2px 10px; border:1px solid var(--line2)}
.t-draft{color:var(--faint)} .t-sent{color:var(--good); border-color:rgba(36,209,122,.4); background:rgba(36,209,122,.10)}
.t-todo{color:var(--warn); border-color:rgba(244,183,64,.4); background:rgba(244,183,64,.10)}
.t-done{color:var(--good); border-color:rgba(36,209,122,.4); background:rgba(36,209,122,.10)}
.t-late{color:var(--bad); border-color:rgba(255,107,107,.45); background:rgba(255,107,107,.10)}
.t-att{color:var(--accent2); border-color:var(--line2); background:rgba(47,143,255,.08)}
.t-ven{color:var(--accent2); border-color:var(--line2); background:rgba(47,143,255,.08)}
.t-devis{color:var(--warn); border-color:rgba(244,183,64,.4); background:rgba(244,183,64,.10)}
.t-avoir{color:#c084fc; border-color:rgba(192,132,252,.4); background:rgba(192,132,252,.10)}
.filters{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px}
.filt{padding:7px 13px; border-radius:999px; border:1px solid var(--line2); background:transparent; color:var(--muted); cursor:pointer; font-size:13px}
.filt:hover{border-color:var(--accent); color:var(--txt)}
.filt.active{border-color:var(--accent); background:rgba(47,143,255,.14); color:#fff}

.grid{display:grid; gap:16px}
.g3{grid-template-columns:repeat(3,1fr)} .g2{grid-template-columns:repeat(2,1fr)}
@media(max-width:900px){.g3,.g2{grid-template-columns:1fr}}
.card{background:linear-gradient(180deg,var(--surface),var(--surface2)); border:1px solid var(--line); border-radius:var(--radius); padding:20px 22px; box-shadow:var(--shadow);}
.card h2{margin:0 0 12px; font-size:16px}
.kpi .lbl{font-size:12px; color:var(--muted); letter-spacing:.02em}
.kpi .val{font-size:26px; font-weight:800; margin-top:4px; font-variant-numeric:tabular-nums}
.kpi .val.blue{color:var(--accent2)} .kpi .val.good{color:var(--good)} .kpi .val.warn{color:var(--warn)}

label{display:block; font-size:12.5px; color:var(--muted); margin:0 0 5px}
input,select,textarea{width:100%; padding:9px 11px; border-radius:var(--radius-s); border:1px solid var(--line2);
  background:#0b1526; color:var(--txt); font:inherit; font-size:14px;}
input:focus,select:focus,textarea:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(47,143,255,.18)}
.field{margin-bottom:12px}
.row{display:grid; gap:12px} .row.c4{grid-template-columns:repeat(4,1fr)} .row.c3{grid-template-columns:repeat(3,1fr)} .row.c2{grid-template-columns:repeat(2,1fr)}
@media(max-width:760px){.row.c4,.row.c3,.row.c2{grid-template-columns:1fr}}

.btn{display:inline-flex; align-items:center; gap:7px; padding:9px 15px; border-radius:var(--radius-s); border:1px solid var(--line2);
  background:rgba(47,143,255,.06); color:var(--txt); cursor:pointer; font-size:14px; transition:.15s;}
.btn:hover{border-color:var(--accent); background:rgba(47,143,255,.14)}
.btn-pri{background:linear-gradient(180deg,var(--accent),var(--accent-d)); border-color:transparent; color:#fff; font-weight:600}
.btn-pri:hover{filter:brightness(1.08)}
.btn-sm{padding:6px 11px; font-size:13px} .btn-ghost{background:transparent}
.btn-danger:hover{border-color:var(--bad); color:var(--bad); background:rgba(255,107,107,.08)}
.right{display:flex; justify-content:flex-end; gap:10px; margin-top:8px}
.themes{display:flex; gap:8px; flex-wrap:wrap}
.theme-chip{display:inline-flex; align-items:center; gap:7px; padding:7px 12px; border:1px solid var(--line2); border-radius:999px; background:transparent; color:var(--muted); cursor:pointer; font-size:13px; transition:.15s}
.theme-chip:hover{border-color:var(--accent); color:var(--txt)}
.theme-chip.active{border-color:var(--accent); background:rgba(47,143,255,.14); color:#fff}
.theme-chip .sw{width:13px; height:13px; border-radius:4px; display:inline-block}
.theme-tag{display:inline-flex; align-items:center; gap:6px; font-size:12.5px; color:var(--muted)}
.theme-tag .sw{width:12px; height:12px; border-radius:4px; display:inline-block}
.emwrap{display:grid; grid-template-columns:1fr 1fr; gap:16px; align-items:start}
@media(max-width:1050px){.emwrap{grid-template-columns:1fr}}
.em-prev{background:#fff; border-radius:10px; overflow:auto; max-height:660px}
.em-prev .inv{zoom:.66}
.em-prev .inv-custom{zoom:.66}
.soc-active{margin:0 6px 6px}
.soc-select{width:100%; padding:8px 10px; border-radius:var(--radius-s); border:1px solid var(--line2); background:#0b1526; color:var(--txt); font-size:13.5px}
.soc-name{font-weight:700; font-size:15px; padding:6px 6px}
.soc-row-act td{background:rgba(47,143,255,.06)}
textarea{resize:vertical; min-height:54px}

table{width:100%; border-collapse:collapse; font-size:13.5px}
th{text-align:left; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--faint); padding:9px 10px; border-bottom:1px solid var(--line2)}
td{padding:10px; border-bottom:1px solid var(--line)}
tr:last-child td{border-bottom:none}
td.r,th.r{text-align:right} .num{font-variant-numeric:tabular-nums}
.empty{color:var(--faint); text-align:center; padding:22px}
.mini{font-size:12px;color:var(--muted)}

.lignes{border:1px solid var(--line2); border-radius:var(--radius-s); overflow:hidden; margin-top:6px}
.li-row{display:grid; grid-template-columns:1fr 84px 110px 92px 110px 34px; gap:8px; align-items:center; padding:8px 10px; border-bottom:1px solid var(--line)}
.li-row:last-child{border-bottom:none}
.li-row.head{background:rgba(47,143,255,.06); font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--faint)}
.li-row input,.li-row select{padding:7px 9px}
@media(max-width:760px){.li-row{grid-template-columns:1fr 60px 80px 70px 80px 30px; gap:5px}}

.totals{margin-top:12px; margin-left:auto; width:min(320px,100%)}
.totals .l{display:flex; justify-content:space-between; padding:5px 0; color:var(--muted)}
.totals .l.big{border-top:1px solid var(--line2); margin-top:5px; padding-top:9px; color:var(--txt); font-weight:800; font-size:16px}

.drop{border:2px dashed var(--line2); border-radius:var(--radius); padding:26px; text-align:center; color:var(--muted); transition:.15s; cursor:pointer}
.drop.over{border-color:var(--accent); background:rgba(47,143,255,.08); color:var(--txt)}

/* toast + modal */
#toast{position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px); opacity:0; pointer-events:none;
  background:#0e1c34; border:1px solid var(--line2); color:var(--txt); padding:11px 18px; border-radius:12px; box-shadow:var(--shadow); transition:.25s; z-index:60; font-size:14px}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
.modal-bg{position:fixed; inset:0; background:rgba(4,8,16,.66); backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center; padding:20px; z-index:50}
.modal{background:var(--surface); border:1px solid var(--line2); border-radius:var(--radius); max-width:820px; width:100%; max-height:90dvh; overflow:auto; box-shadow:var(--shadow)}
.modal-h{display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--surface)}
.modal-b{padding:18px}
#yada-ver{position:fixed; left:12px; bottom:8px; font-size:11px; color:var(--faint); z-index:5}

@media(max-width:820px){
  .app{grid-template-columns:1fr}
  aside{position:static; height:auto; flex-direction:row; align-items:center; overflow-x:auto; padding:10px 12px}
  aside .nav-sec,aside .side-foot{display:none}
  main{padding:20px 14px 70px}
}

/* ---- Zone d'impression (facture PDF) ---- */
#print-area{display:none}
@media print{
  body{background:#fff}
  .app,#toast,#yada-ver,.modal-bg{display:none !important}
  #print-area{display:block !important}
}
.inv{--ia:#0a64d6; --ihbg:#eef4ff; --ihtx:#33507a; --iband:transparent; --ico:#0a64d6;
  color:#0b1220; font-size:13px; max-width:780px; margin:0 auto; padding:36px 40px; background:#fff; font-family:var(--sans)}
.inv .h{display:flex; justify-content:space-between; align-items:flex-start; border-bottom:2px solid var(--ia); padding-bottom:16px; margin-bottom:22px}
.inv .h .co{font-size:20px; font-weight:800; color:var(--ico)}
.inv .h .ti{text-align:right}
.inv .h .ti .big{font-size:22px; font-weight:800}
.inv .parties{display:flex; justify-content:space-between; gap:20px; margin-bottom:20px}
.inv .parties .b{font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:#5a6b86}
.inv table{width:100%; border-collapse:collapse; font-size:12.5px}
.inv th{background:var(--ihbg); color:var(--ihtx); text-transform:uppercase; font-size:10.5px; padding:8px; text-align:left}
.inv th.r{text-align:right}
.inv td{border-bottom:1px solid #e3e9f2; padding:8px; color:#0b1220}
.inv .tot{margin-left:auto; width:260px; margin-top:14px}
.inv .tot .l{display:flex; justify-content:space-between; padding:4px 0}
.inv .tot .l.big{border-top:2px solid var(--ia); margin-top:5px; padding-top:8px; font-weight:800; font-size:15px}
.inv .foot{margin-top:26px; font-size:11px; color:#5a6b86; border-top:1px solid #e3e9f2; padding-top:10px}

/* Thèmes de facture */
.inv.th-emeraude{--ia:#059669; --ihbg:#e7f6ef; --ihtx:#1c6b50; --ico:#059669}
.inv.th-indigo{--ia:#6366f1; --ihbg:#ecedff; --ihtx:#4548b8; --ico:#6366f1}
.inv.th-minimal{--ia:#111827; --ihbg:#f3f4f6; --ihtx:#374151; --ico:#111827}
.inv.th-minimal .h .co{letter-spacing:.14em; text-transform:uppercase; font-size:16px}
.inv.th-minimal th{letter-spacing:.08em}
/* Thème « bandeau » : en-tête plein couleur */
.inv.th-bandeau{--ia:#1e3a8a; --ihbg:#e8ecfb; --ihtx:#26407e; padding:0}
.inv.th-bandeau .h{background:var(--ia); color:#fff; padding:26px 40px 22px; margin-bottom:0; border-bottom:none}
.inv.th-bandeau .h .co,.inv.th-bandeau .h .ti,.inv.th-bandeau .h .ti *{color:#fff}
.inv .body{display:contents}
.inv.th-bandeau .body{display:block; padding:24px 40px 36px}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div id="print-area"></div>
<div id="toast"></div>
<span id="yada-ver">YADA PRO · v0.9</span>

<script>
'use strict';
var VERSION='0.9.0';

/* ---------- Données (localStorage) ---------- */
function seed(){ return { societes:[], societeActive:null, contacts:[], emises:[], recues:[], catalogue:[], seq:{fac:0} }; }
var db = load() || seed();
function load(){ try{ return JSON.parse(localStorage.getItem('yadapro')||'null'); }catch(e){ return null; } }
function save(){ try{ localStorage.setItem('yadapro', JSON.stringify(db)); return true; }catch(e){ return false; } }

/* ---------- Utilitaires ---------- */
function uid(){ return 'x'+Math.random().toString(36).slice(2,10); }
function r2(n){ return Math.round((+n||0)*100)/100; }
function eur(n){ return (r2(n)).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'; }
function todayStr(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function frDate(s){ if(!s) return '—'; var p=String(s).split('-'); return p.length===3? p[2]+'/'+p[1]+'/'+p[0] : s; }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toast._t); toast._t=setTimeout(function(){ t.classList.remove('show'); },2600); }
function nextNum(soc, type){ soc=soc||societeActiveObj(); var pfx=type==='devis'?'DEV':type==='avoir'?'AV':'FAC'; if(!soc) return pfx+'-'+new Date().getFullYear()+'-0001'; soc.seq=(soc.seq||0)+1; return pfx+'-'+new Date().getFullYear()+'-'+String(soc.seq).padStart(4,'0'); }
function contact(id){ return db.contacts.find(function(c){ return c.id===id; }); }

/* ---------- Sociétés (multi-société) ---------- */
function societeActiveObj(){ return (db.societes||[]).filter(function(s){return s.id===db.societeActive;})[0] || (db.societes||[])[0] || null; }
function societeOf(f){ return (db.societes||[]).filter(function(s){return s.id===f.societeId;})[0] || societeActiveObj(); }
function emisesActives(){ return db.emises.filter(function(f){ return f.societeId===db.societeActive; }); }
function ensureSocietes(){
  if(!db.catalogue) db.catalogue=[];
  if(!db.societes) db.societes=[];
  if(!db.societes.length){ db.societes.push({ id:uid(), nom:'Ma société', adresse:'', siret:'', tva:'', email:'', tel:'', iban:'', logo:'', theme:'classique', customFormat:'', seq:(db.seq&&db.seq.fac)||0 }); }
  db.societes.forEach(function(s){ if(s.seq==null) s.seq=0; if(!s.theme) s.theme='classique'; });
  if(!db.societeActive || !societeActiveObj()) db.societeActive=db.societes[0].id;
  /* rattacher les factures existantes (sans société) à la société active */
  db.emises.forEach(function(f){ if(!f.societeId) f.societeId=db.societeActive; });
}
function setSocieteActive(id){ db.societeActive=id; emResetDraft(); save(); render(); toast('Société active : '+((societeActiveObj()||{}).nom||'')); }

/* Thèmes d'habillage de la facture de vente */
var THEMES=[
  {id:'classique', nom:'Classique', col:'#0a64d6'},
  {id:'bandeau',   nom:'Bandeau',   col:'#1e3a8a'},
  {id:'emeraude',  nom:'Émeraude',  col:'#059669'},
  {id:'indigo',    nom:'Indigo',    col:'#6366f1'},
  {id:'minimal',   nom:'Minimal',   col:'#111827'}
];
var THEME_NOM={}; THEMES.forEach(function(t){ THEME_NOM[t.id]=t.nom; });
function themeChips(activeId, onclick){ return '<div class="themes">'+THEMES.map(function(t){
  return '<button type="button" class="theme-chip'+(t.id===activeId?' active':'')+'" onclick="'+onclick+'(\''+t.id+'\')"><span class="sw" style="background:'+t.col+'"></span>'+t.nom+'</button>'; }).join('')+'</div>'; }

/* ---------- Marque ---------- */
function yadaMark(px){ px=px||36; var id='g'+uid();
  return '<svg width="'+px+'" height="'+px+'" viewBox="0 0 48 48" style="border-radius:11px;box-shadow:0 6px 16px rgba(30,120,255,.35)">'
   +'<defs><linearGradient id="'+id+'" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5ab0ff"/><stop offset="1" stop-color="#0a64d6"/></linearGradient></defs>'
   +'<rect x="1" y="1" width="46" height="46" rx="13" fill="url(#'+id+')"/>'
   +'<path d="M14 14 L24 26 L34 14 M24 26 L24 35" fill="none" stroke="#fff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>'
   +'<circle cx="35.5" cy="33.5" r="3" fill="#24d17a"/></svg>'; }

/* ---------- Navigation ---------- */
var NAV=[
  {id:'dash', ico:'▦', label:'Tableau de bord'},
  {id:'emises', ico:'➤', label:'Envoyer'},
  {id:'suivi', ico:'⏱', label:'Suivi'},
  {id:'recues', ico:'⇩', label:'Réceptionner'},
  {id:'contacts', ico:'☰', label:'Contacts'},
  {id:'catalogue', ico:'▤', label:'Catalogue'},
  {id:'societes', ico:'🏢', label:'Sociétés'},
  {id:'donnees', ico:'💾', label:'Données'}
];
var current='dash';
function go(id){ current=id; if(id!=='societes') socEdit=null; if(id!=='contacts') ctEdit=null; if(id==='emises') emResetDraft(); render(); }

function sidebar(){
  var nRecuesTodo=db.recues.filter(function(r){ return r.statut!=='traitee'; }).length;
  var nav=NAV.map(function(m){
    var badge = m.id==='recues' && nRecuesTodo ? '<span class="badge">'+nRecuesTodo+'</span>' : '';
    return '<button class="nav-btn'+(m.id===current?' active':'')+'" onclick="go(\''+m.id+'\')"><span class="ico">'+m.ico+'</span>'+m.label+badge+'</button>';
  }).join('');
  var soc=societeActiveObj();
  var socBox = (db.societes||[]).length>1
    ? '<select class="soc-select" onchange="setSocieteActive(this.value)">'+db.societes.map(function(s){return '<option value="'+s.id+'"'+(soc&&s.id===soc.id?' selected':'')+'>'+esc(s.nom)+'</option>';}).join('')+'</select>'
    : '<div class="soc-name">'+esc(soc?soc.nom:'—')+'</div>';
  return '<aside><div class="brand">'+yadaMark(36)+'<div><span class="name">YADA</span><span class="sub">PRO</span></div></div>'
    +'<div class="nav-sec">Société active</div><div class="soc-active">'+socBox+'</div>'
    +'<div class="nav-sec">Factures</div>'+nav
    +'<div class="side-foot">Hub de factures · <b>v'+VERSION+'</b><br>Multi-société.</div></aside>';
}

/* ---------- Tableau de bord ---------- */
function pageDash(){
  var em=emFactures(), envoyees=em.filter(function(f){return f.statut==='envoyee';});
  var totTTC=r2(em.reduce(function(a,f){return a+ (f.ttc||0);},0));
  var enc=r2(em.reduce(function(a,f){return a+factRegle(f);},0));
  var reste=r2(em.reduce(function(a,f){return a+factReste(f);},0));
  var retard=em.filter(function(f){return factPaie(f).key==='retard';});
  var recuesTodo=db.recues.filter(function(r){return r.statut!=='traitee';});
  var depenses=r2(db.recues.reduce(function(a,x){return a+(+x.montant||0);},0));
  var tvaCol=r2(em.reduce(function(a,f){return a+(+f.tva||0);},0));
  var tvaDed=r2(db.recues.reduce(function(a,x){return a+(+x.tva||0);},0));
  var tvaSolde=r2(tvaCol-tvaDed);

function emFactures(){ return emisesActives().filter(function(f){ return (f.type||'facture')==='facture'; }); }
function factRegle(f){ return r2((+f.acompte||0) + (f.encaissements||[]).reduce(function(a,e){return a+(+e.montant||0);},0)); }
function factReste(f){ return r2((f.ttc||0)-factRegle(f)); }
function factPaie(f){ var regle=factRegle(f), reste=factReste(f);
  if(reste<=0.005) return {key:'paye', regle:regle, reste:0, label:'payée', cls:'t-done'};
  if(f.statut==='envoyee' && f.ech && todayStr()>f.ech) return {key:'retard', regle:regle, reste:reste, label:'en retard', cls:'t-late'};
  if(regle>0.005) return {key:'partiel', regle:regle, reste:reste, label:'partielle', cls:'t-todo'};
  return {key:'attente', regle:regle, reste:reste, label:'à encaisser', cls:'t-att'};
}

    +kpi('Encaissé', eur(kEnc), 'good', '')

function emTotaux(){ var htBrut=0,tvaBrut=0; (emDraft.lignes||[]).forEach(function(l){ var b=r2((+l.qte||0)*(+l.pu||0)); htBrut+=b; tvaBrut+=b*(+l.taux||0)/100; });

  var rem = emDraft.remiseType==='percent' ? htBrut*(+emDraft.remiseVal||0)/100 : (+emDraft.remiseVal||0);
  rem = r2(Math.min(Math.max(rem,0), htBrut));
  var htNet=r2(htBrut-rem); var ratio = htBrut>0 ? htNet/htBrut : 1; var tva=r2(tvaBrut*ratio); var ttc=r2(htNet+tva);
  var signe = emDraft.type==='avoir' ? -1 : 1;
  var acompte = emDraft.type==='facture' ? r2(Math.min(Math.max(+emDraft.acompte||0,0), ttc)) : 0;
  return { htBrut:r2(htBrut*signe), remise:r2(rem*signe), ht:r2(htNet*signe), tva:r2(tva*signe), ttc:r2(ttc*signe), acompte:acompte, net:r2(ttc*signe-acompte) }; }

var recPending=null; /* {nomFichier, fichier(dataURL|null)} */
function recFichier(input){ var file=input.files&&input.files[0]; if(!file)return;
  var fn=document.getElementById('rec-fname'); fn.textContent='Lecture de « '+file.name+' »…';
  var rd=new FileReader();
  rd.onload=function(){ recPending={ nomFichier:file.name, fichier:(file.size<1500000? rd.result : null) };
    fn.innerHTML='Fichier : <b>'+esc(file.name)+'</b>'+(recPending.fichier?'':' <span style="color:var(--warn)">(trop volumineux : non conservé, seules les infos seront enregistrées)</span>'); };
  rd.onerror=function(){ recPending={ nomFichier:file.name, fichier:null }; fn.textContent='Fichier : '+file.name+' (aperçu indisponible)'; };
  rd.readAsDataURL(file);
}
var CATS_ACHAT=['Achats','Sous-traitance','Frais généraux','Matériel','Déplacements','Autre'];
function recAjouter(){
  var four=(document.getElementById('rec-four').value||'').trim();
  var date=document.getElementById('rec-date').value||todayStr();
  var mont=+document.getElementById('rec-mont').value||0;
  var tva=+document.getElementById('rec-tva').value||0;
  var cat=(document.getElementById('rec-cat')||{}).value||'Autre';
  if(!four && !recPending) return toast('Indiquez au moins un fournisseur ou un fichier.');
  var r={ id:uid(), fournisseur:four, date:date, montant:r2(mont), tva:r2(tva), categorie:cat, statut:'todo', cree:Date.now(),
    nomFichier:recPending?recPending.nomFichier:null, fichier:recPending?recPending.fichier:null };
  db.recues.push(r);
  if(!save()){ r.fichier=null; save(); toast('Enregistré, mais le fichier était trop volumineux pour le stockage local.'); }
  else toast('Facture reçue enregistrée.');
  recPending=null; render();
}

function recVoir(id){ var r=db.recues.find(function(x){return x.id===id;}); if(!r||!r.fichier)return; var w=window.open(); if(w){ w.document.write('<title>'+esc(r.nomFichier||'facture')+'</title><iframe src="'+r.fichier+'" style="border:0;width:100%;height:100vh"></iframe>'); } }

/* Glisser-déposer */
function bindDrop(){ var d=document.getElementById('drop'); if(!d)return;
  ['dragenter','dragover'].forEach(function(e){ d.addEventListener(e,function(ev){ ev.preventDefault(); d.classList.add('over'); }); });
  ['dragleave','drop'].forEach(function(e){ d.addEventListener(e,function(ev){ ev.preventDefault(); d.classList.remove('over'); }); });
  d.addEventListener('drop',function(ev){ var f=ev.dataTransfer&&ev.dataTransfer.files&&ev.dataTransfer.files[0]; if(f){ var inp=document.getElementById('rec-file'); var dt=new DataTransfer(); dt.items.add(f); inp.files=dt.files; recFichier(inp); } });
}

    +'<div style="overflow-x:auto"><table><thead><tr><th>Numéro</th><th>Date</th><th class="r">TTC</th><th class="r">Reste</th><th>Statut</th></tr></thead><tbody>'+(rows||'<tr><td colspan="5" class="empty">Aucune facture pour ce client.</td></tr>')+'</tbody></table></div>';
  openModal('Fiche — '+esc(c.nom), body, '<button class="btn btn-sm" onclick="closeModal()">Fermer</button>'); }
function pageContacts(){
  var rows=db.contacts.slice().sort(function(a,b){return (a.nom||'').localeCompare(b.nom||'');}).map(function(c){
    return '<tr><td><b>'+esc(c.nom)+'</b>'+(c.siren?'<div class="mini">SIREN '+esc(c.siren)+'</div>':'')+'</td><td>'+(c.type==='fournisseur'?'Fournisseur':'Client')+'</td><td>'+esc(c.email||'—')+'</td><td class="mini">'+esc(c.tel||'')+'</td>'

      +'<button class="btn btn-ghost btn-sm btn-danger" onclick="contactSuppr(\''+c.id+'\')">✕</button></td></tr>'; }).join('');
  var e=ctEdit, form;
  if(e){ form='<div class="card"><h2>'+(e._new?'Nouveau contact':'Modifier « '+esc(e.nom||'')+' »')+'</h2>'
    +'<div class="row c2"><div class="field"><label>Nom / raison sociale *</label><input id="ct-nom" value="'+esc(e.nom)+'"></div>'
    +'<div class="field"><label>Type</label><select id="ct-type"><option value="client"'+(e.type!=='fournisseur'?' selected':'')+'>Client (à qui j\'envoie)</option><option value="fournisseur"'+(e.type==='fournisseur'?' selected':'')+'>Fournisseur (de qui je reçois)</option></select></div></div>'
    +'<div class="row c2"><div class="field"><label>E-mail</label><input id="ct-email" type="email" value="'+esc(e.email)+'"></div>'
    +'<div class="field"><label>Téléphone</label><input id="ct-tel" value="'+esc(e.tel)+'"></div></div>'

    +'<div class="right"><button class="btn btn-ghost" onclick="contactAnnuler()">Annuler</button><button class="btn btn-pri" onclick="contactEnregistrer()">Enregistrer</button></div></div>';
  } else { form='<div class="card"><h2>Répertoire</h2><p class="mini">Clients (à qui vous facturez) et fournisseurs. Sur un client : <b>Fiche</b> affiche son historique de factures et son reste dû.</p><div class="right"><button class="btn btn-pri btn-sm" onclick="contactNouveau()">+ Nouveau contact</button></div></div>'; }
  return '<main>'+ph('Contacts')
    +'<div class="grid g2" style="align-items:start">'+form
    +'<div class="card"><h2>Répertoire ('+db.contacts.length+')</h2>'
    +'<div style="overflow-x:auto"><table><thead><tr><th>Nom</th><th>Type</th><th>E-mail</th><th>Tél</th><th class="r">Actions</th></tr></thead>'
    +'<tbody>'+(rows||'<tr><td colspan="5" class="empty">Aucun contact.</td></tr>')+'</tbody></table></div></div>'
    +'</div></main>';
}

/* ============================================================
   CATALOGUE — articles / prestations réutilisables
   ============================================================ */
function emCatalogue(){ emSync();
  var items=db.catalogue||[];
  var body = items.length ? '<div style="overflow-x:auto"><table><thead><tr><th>Désignation</th><th class="r">PU HT</th><th>TVA</th><th></th></tr></thead><tbody>'
    + items.slice().sort(function(a,b){return (a.desc||'').localeCompare(b.desc||'');}).map(function(a){ return '<tr><td>'+esc(a.desc)+(a.unite?' <span class="mini">('+esc(a.unite)+')</span>':'')+'</td><td class="r num">'+eur(a.pu)+'</td><td>'+(a.taux||0)+' %</td><td class="r"><button class="btn btn-pri btn-sm" onclick="emAjoutCat(\''+a.id+'\')">Ajouter</button></td></tr>'; }).join('')
    + '</tbody></table></div>'
    : '<div class="empty">Catalogue vide — ajoutez des articles dans l\'onglet <b>Catalogue</b>.</div>';
  openModal('Insérer depuis le catalogue', body, '<button class="btn btn-sm" onclick="closeModal()">Fermer</button>'); }
function emAjoutCat(id){ var a=(db.catalogue||[]).filter(function(x){return x.id===id;})[0]; if(!a)return; emSync();
  if(emDraft.lignes.length===1 && !String(emDraft.lignes[0].desc||'').trim() && !(+emDraft.lignes[0].pu)) emDraft.lignes=[];
  emDraft.lignes.push({desc:a.desc, qte:1, pu:a.pu, taux:a.taux}); closeModal(); render(); toast('« '+a.desc+' » ajouté.'); }
function emLignesToCat(){ emSync(); var n=0;
  (emDraft.lignes||[]).forEach(function(l){ var d=String(l.desc||'').trim(); if(!d)return;
    var exists=(db.catalogue||[]).some(function(a){return a.desc===d && r2(a.pu)===r2(+l.pu||0);});
    if(!exists){ db.catalogue.push({id:uid(), desc:d, pu:r2(+l.pu||0), taux:+l.taux||20, unite:''}); n++; } });
  save(); render(); toast(n?('+'+n+' article(s) enregistré(s) au catalogue.'):'Rien de nouveau à enregistrer.'); }
function catAjouter(){ var d=(document.getElementById('cat-desc').value||'').trim(); if(!d) return toast('Indiquez une désignation.');
  db.catalogue.push({ id:uid(), desc:d, unite:(document.getElementById('cat-unite').value||'').trim(), pu:r2(+document.getElementById('cat-pu').value||0), taux:+document.getElementById('cat-taux').value||20 });
  save(); render(); toast('Article ajouté au catalogue.'); }
function catSupprimer(id){ db.catalogue=db.catalogue.filter(function(a){return a.id!==id;}); save(); render(); }

/* ============================================================
   DONNÉES — export comptable (CSV) + sauvegarde/restauration (JSON)
   ============================================================ */
function numfr(x){ return String(r2(x)).replace('.',','); }
function csvCell(v){ v=String(v==null?'':v); if(/[";\n]/.test(v)) v='"'+v.replace(/"/g,'""')+'"'; return v; }
function toCSV(rows){ return rows.map(function(r){ return r.map(csvCell).join(';'); }).join('\r\n'); }
function dlFichier(name, content, mime){ var blob=new Blob(['﻿'+content],{type:(mime||'text/plain')+';charset=utf-8'});
  var url=URL.createObjectURL(blob); var a=document.createElement('a'); a.href=url; a.download=name; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(function(){ URL.revokeObjectURL(url); },1500); }
function slug(s){ return String(s||'societe').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,40)||'societe'; }
function exportVentesCSV(){ var soc=societeActiveObj()||{}; var list=emisesActives().slice().sort(function(a,b){return (a.date||'')<(b.date||'')?-1:1;});
  var rows=[['Numéro','Type','Date','Échéance','Client','HT','TVA','TTC','Réglé','Reste dû','Statut']];
  list.forEach(function(f){ var c=contact(f.contactId)||{}; var p=factPaie(f);
    rows.push([f.numero, (f.type||'facture'), f.date, f.ech||'', c.nom||'', numfr(f.ht), numfr(f.tva), numfr(f.ttc), numfr(p.regle), numfr(p.reste), p.label]); });
  dlFichier('ventes-'+slug(soc.nom)+'.csv', toCSV(rows), 'text/csv'); toast(list.length+' document(s) exporté(s) en CSV.'); }
function exportEncaissementsCSV(){ var soc=societeActiveObj()||{}; var rows=[['Facture','Client','Date','Montant','Nature']]; var n=0;
  emisesActives().forEach(function(f){ var c=contact(f.contactId)||{};
    if((+f.acompte||0)>0.005){ rows.push([f.numero, c.nom||'', f.date, numfr(f.acompte), 'acompte']); n++; }
    (f.encaissements||[]).forEach(function(e){ rows.push([f.numero, c.nom||'', e.date||'', numfr(e.montant), 'encaissement']); n++; }); });
  dlFichier('encaissements-'+slug(soc.nom)+'.csv', toCSV(rows), 'text/csv'); toast(n+' encaissement(s) exporté(s).'); }
function sauvegardeJSON(){ dlFichier('yada-pro-sauvegarde-'+todayStr()+'.json', JSON.stringify(db), 'application/json'); toast('Sauvegarde téléchargée.'); }
function restaurerJSON(input){ var file=input.files&&input.files[0]; if(!file)return; var rd=new FileReader();
  rd.onload=function(){ var data; try{ data=JSON.parse(rd.result); }catch(e){ return toast('Fichier invalide (JSON illisible).'); }
    if(!data || typeof data!=='object' || !('emises' in data) || !('societes' in data)) return toast('Ce fichier n\'est pas une sauvegarde YADA PRO.');
    if(!confirm('Restaurer cette sauvegarde ? Les données actuelles seront remplacées.'))return;
    db=data; ensureSocietes(); save(); render(); toast('Sauvegarde restaurée.'); };
  rd.onerror=function(){ toast('Lecture impossible.'); }; rd.readAsText(file); }
function pageDonnees(){ var soc=societeActiveObj()||{};
  return '<main>'+ph('Données', '<span class="badge">'+esc(soc.nom||'')+'</span>')
    +'<div class="grid g2" style="align-items:start">'
    +'<div class="card"><h2>Export comptable (CSV)</h2><p class="mini">Exporte les données de la société active, exploitables dans un tableur ou par votre comptable (séparateur « ; », compatible Excel FR).</p>'
    +'<div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-pri" onclick="exportVentesCSV()">⬇ Ventes (factures)</button>'
    +'<button class="btn" onclick="exportEncaissementsCSV()">⬇ Encaissements</button></div></div>'
    +'<div class="card"><h2>Sauvegarde &amp; restauration</h2><p class="mini">Toutes vos données sont stockées sur cet appareil. Téléchargez une sauvegarde (JSON) pour les sécuriser ou les transférer, puis restaurez-la au besoin.</p>'
    +'<div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-pri" onclick="sauvegardeJSON()">⬇ Télécharger la sauvegarde</button>'
    +'<button class="btn" onclick="document.getElementById(\'restore-file\').click()">⬆ Restaurer une sauvegarde</button>'
    +'<input id="restore-file" type="file" accept="application/json,.json" style="display:none" onchange="restaurerJSON(this)"></div>'
    +'<div class="mini" style="margin-top:8px;color:var(--warn)">La restauration remplace toutes les données actuelles.</div></div>'
    +'</div></main>';
}
function pageCatalogue(){
  var rows=(db.catalogue||[]).slice().sort(function(a,b){return (a.desc||'').localeCompare(b.desc||'');}).map(function(a){
    return '<tr><td><b>'+esc(a.desc)+'</b>'+(a.unite?' <span class="mini">('+esc(a.unite)+')</span>':'')+'</td><td class="r num">'+eur(a.pu)+'</td><td>'+(a.taux||0)+' %</td>'
      +'<td class="r"><button class="btn btn-ghost btn-sm btn-danger" onclick="catSupprimer(\''+a.id+'\')">✕</button></td></tr>'; }).join('');
  return '<main>'+ph('Catalogue d\'articles')
    +'<div class="grid g2" style="align-items:start">'
    +'<div class="card"><h2>Ajouter un article</h2>'
    +'<div class="field"><label>Désignation</label><input id="cat-desc" placeholder="Produit / prestation"></div>'
    +'<div class="row c3"><div class="field"><label>Unité</label><input id="cat-unite" placeholder="h, j, pièce…"></div>'
    +'<div class="field"><label>PU HT (€)</label><input id="cat-pu" type="number" step="any" placeholder="0,00"></div>'
    +'<div class="field"><label>TVA %</label><select id="cat-taux">'+[20,10,5.5,0].map(function(x){return '<option>'+x+'</option>';}).join('')+'</select></div></div>'
    +'<div class="right"><button class="btn btn-pri" onclick="catAjouter()">Ajouter</button></div></div>'
    +'<div class="card"><h2>Articles ('+(db.catalogue||[]).length+')</h2><p class="mini">Réutilisez-les en 1 clic depuis <b>Envoyer</b> → « Depuis le catalogue ».</p>'
    +'<div style="overflow-x:auto"><table><thead><tr><th>Désignation</th><th class="r">PU HT</th><th>TVA</th><th></th></tr></thead>'
    +'<tbody>'+(rows||'<tr><td colspan="4" class="empty">Catalogue vide.</td></tr>')+'</tbody></table></div></div>'
    +'</div></main>';
}

/* ============================================================
   SOCIÉTÉS — enregistrement, édition, format (thème ou modèle importé)
   ============================================================ */
var socEdit=null;
function socNouvelle(){ socEdit={ id:uid(), nom:'', adresse:'', siret:'', tva:'', email:'', tel:'', iban:'', logo:'', theme:'classique', customFormat:'', seq:0, _new:true }; render(); }
function socEditer(id){ var s=db.societes.filter(function(x){return x.id===id;})[0]; if(!s)return; socEdit=JSON.parse(JSON.stringify(s)); render(); }
function socAnnuler(){ socEdit=null; render(); }
function socSync(){ if(!socEdit)return; ['nom','adresse','siret','tva','email','tel','iban'].forEach(function(k){ var el=document.getElementById('sc-'+k); if(el) socEdit[k]=el.value; }); }
function socSetTheme(id){ socSync(); socEdit.theme=id; render(); }
function socLogo(input){ var file=input.files&&input.files[0]; if(!file)return; socSync(); var rd=new FileReader(); rd.onload=function(){ socEdit.logo=rd.result; render(); }; rd.readAsDataURL(file); }
function socRetirerLogo(){ socSync(); socEdit.logo=''; render(); }
function socImporterFormat(input){ var file=input.files&&input.files[0]; if(!file)return; socSync(); var rd=new FileReader(); rd.onload=function(){ socEdit.customFormat=String(rd.result); render(); toast('Format importé — utilisé pour les factures de cette société.'); }; rd.readAsText(file); }
function socRetirerFormat(){ socSync(); socEdit.customFormat=''; render(); toast('Format personnalisé retiré (retour aux thèmes).'); }
function socEnregistrer(){ socSync(); if(!(socEdit.nom||'').trim()) return toast('Indiquez le nom de la société.');
  var clean=JSON.parse(JSON.stringify(socEdit)); delete clean._new;
  var i=db.societes.map(function(s){return s.id;}).indexOf(clean.id);
  if(i>=0) db.societes[i]=clean; else db.societes.push(clean);
  if(!db.societeActive) db.societeActive=clean.id;
  save(); socEdit=null; render(); toast('Société « '+clean.nom+' » enregistrée.'); }
function socSupprimer(id){ var s=db.societes.filter(function(x){return x.id===id;})[0]; if(!s)return;
  if(db.societes.length<=1) return toast('Impossible de supprimer la dernière société.');
  if(!confirm('Supprimer « '+s.nom+' » ?'))return;
  db.societes=db.societes.filter(function(x){return x.id!==id;});
  if(db.societeActive===id) db.societeActive=db.societes[0].id;
  save(); render(); toast('Société supprimée.'); }
function socModeleExemple(){
  var tpl='<!-- Modele de facture YADA PRO : les balises {{...}} sont remplacees automatiquement -->\n'
   +'<div style="font-family:Arial,sans-serif;padding:32px;color:#111">\n'
   +'  <table style="width:100%"><tr>\n'
   +'    <td>{{logo}}<h1 style="margin:6px 0;color:#0a64d6">{{societe}}</h1><div>{{adresse}}</div><div>SIRET {{siret}} - TVA {{tva}}</div></td>\n'
   +'    <td style="text-align:right"><h2>FACTURE {{numero}}</h2><div>Date : {{date}}</div><div>Echeance : {{echeance}}</div></td>\n'
   +'  </tr></table>\n'
   +'  <p><b>Client :</b> {{client}} ({{client_email}})</p>\n'
   +'  <table style="width:100%;border-collapse:collapse" border="1" cellpadding="6">\n'
   +'    <thead><tr><th>Designation</th><th>Qte</th><th>PU HT</th><th>TVA</th><th>Total HT</th></tr></thead>\n'
   +'    <tbody>{{lignes}}</tbody>\n'
   +'  </table>\n'
   +'  <p style="text-align:right">Total HT : {{ht}}<br>TVA : {{tva_montant}}<br><b>Total TTC : {{ttc}}</b></p>\n'
   +'  <p>IBAN : {{iban}}</p>\n'
   +'</div>\n';
  var blob=new Blob([tpl],{type:'text/html'}); var url=URL.createObjectURL(blob);
  var a=document.createElement('a'); a.href=url; a.download='modele-facture-yada.html'; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(function(){ URL.revokeObjectURL(url); },1500);
}
function pageSocietes(){
  var rows=(db.societes||[]).map(function(s){ var act=s.id===db.societeActive;
    return '<tr class="'+(act?'soc-row-act':'')+'"><td><b>'+esc(s.nom)+'</b>'+(act?' <span class="tag t-sent">active</span>':'')+(s.customFormat?' <span class="tag t-todo">format importé</span>':'')+'</td>'
      +'<td class="mini">'+esc(s.siret||'—')+'</td>'
      +'<td class="r" style="white-space:nowrap">'+(act?'':'<button class="btn btn-ghost btn-sm" onclick="setSocieteActive(\''+s.id+'\')">Activer</button> ')
      +'<button class="btn btn-sm" onclick="socEditer(\''+s.id+'\')">Modifier</button> '
      +'<button class="btn btn-ghost btn-sm btn-danger" onclick="socSupprimer(\''+s.id+'\')">✕</button></td></tr>'; }).join('');
  var liste='<div class="card"><div style="display:flex;align-items:center;gap:12px;margin-bottom:12px"><h2 style="margin:0">Mes sociétés ('+db.societes.length+')</h2><div style="flex:1"></div><button class="btn btn-pri btn-sm" onclick="socNouvelle()">+ Nouvelle société</button></div>'
    +'<div style="overflow-x:auto"><table><thead><tr><th>Nom</th><th>SIRET</th><th class="r">Actions</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
  var editor;
  if(socEdit){
    editor='<div class="card"><h2>'+(socEdit._new?'Nouvelle société':'Modifier « '+esc(socEdit.nom||'')+' »')+'</h2>'
      +'<div class="row c2"><div class="field"><label>Nom / raison sociale *</label><input id="sc-nom" value="'+esc(socEdit.nom)+'"></div>'
      +'<div class="field"><label>SIRET</label><input id="sc-siret" value="'+esc(socEdit.siret)+'"></div></div>'
      +'<div class="field"><label>Adresse</label><textarea id="sc-adresse" rows="2">'+esc(socEdit.adresse)+'</textarea></div>'
      +'<div class="row c2"><div class="field"><label>TVA intracom.</label><input id="sc-tva" value="'+esc(socEdit.tva)+'"></div>'
      +'<div class="field"><label>IBAN</label><input id="sc-iban" value="'+esc(socEdit.iban)+'"></div></div>'
      +'<div class="row c2"><div class="field"><label>E-mail</label><input id="sc-email" value="'+esc(socEdit.email)+'"></div>'
      +'<div class="field"><label>Téléphone</label><input id="sc-tel" value="'+esc(socEdit.tel)+'"></div></div>'
      +'<div class="field"><label>Logo</label><div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">'
        +(socEdit.logo?'<img src="'+socEdit.logo+'" style="max-height:44px;max-width:130px;background:#fff;border-radius:6px;padding:3px"><button class="btn btn-ghost btn-sm" onclick="socRetirerLogo()">Retirer</button>':'<button class="btn btn-sm" onclick="document.getElementById(\'sc-logo\').click()">Importer un logo</button>')
        +'<input id="sc-logo" type="file" accept="image/*" style="display:none" onchange="socLogo(this)"></div></div>'
      +'<div class="field"><label>Format de facture par défaut</label>'+themeChips(socEdit.theme||'classique','socSetTheme')+'</div>'
      +'<div class="field"><label>Format personnalisé (importé)</label>'
        +'<div class="mini" style="margin-bottom:6px">Importez un modèle HTML avec des balises <code>{{numero}}</code>, <code>{{client}}</code>, <code>{{lignes}}</code>, <code>{{ttc}}</code>… remplies automatiquement. Défini, il remplace le thème.</div>'
        +'<div style="display:flex;gap:8px;flex-wrap:wrap">'
        +'<button class="btn btn-sm" onclick="document.getElementById(\'sc-format\').click()">Importer un format</button>'
        +'<button class="btn btn-ghost btn-sm" onclick="socModeleExemple()">Modèle d\'exemple</button>'
        +(socEdit.customFormat?'<button class="btn btn-ghost btn-sm btn-danger" onclick="socRetirerFormat()">Retirer le format</button>':'')
        +'<input id="sc-format" type="file" accept=".html,.htm,text/html" style="display:none" onchange="socImporterFormat(this)"></div>'
        +(socEdit.customFormat?'<div class="mini" style="margin-top:6px;color:var(--good)">✓ Format importé ('+socEdit.customFormat.length+' caractères).</div>':'')+'</div>'
      +'<div class="right"><button class="btn btn-ghost" onclick="socAnnuler()">Annuler</button><button class="btn btn-pri" onclick="socEnregistrer()">Enregistrer</button></div>'
      +'</div>';
  } else {
    editor='<div class="card"><h2>Facturation par société</h2><p>Chaque société a ses <b>propres factures</b> (numérotation dédiée), son <b>format</b> (thème ou modèle importé), son <b>logo</b> et ses coordonnées d\'émetteur.</p><p class="mini">Choisissez la <b>société active</b> dans la barre latérale : l\'onglet <b>Envoyer</b> facture en son nom, avec son émetteur et son format.</p>'
      +'<div class="right"><button class="btn btn-pri btn-sm" onclick="socNouvelle()">+ Nouvelle société</button></div></div>';
  }
  return '<main>'+ph('Sociétés')+'<div class="grid g2" style="align-items:start">'+liste+editor+'</div></main>';
}

/* ---------- Modale ---------- */
function openModal(title,body,actions){ var bg=document.createElement('div'); bg.className='modal-bg'; bg.id='modal-bg';
  bg.onclick=function(e){ if(e.target===bg) closeModal(); };
  bg.innerHTML='<div class="modal"><div class="modal-h"><b>'+title+'</b><button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button></div>'
    +'<div class="modal-b">'+body+'</div><div class="modal-h" style="border-top:1px solid var(--line);border-bottom:none;justify-content:flex-end;gap:8px">'+(actions||'')+'</div></div>';
  document.body.appendChild(bg);
}
function closeModal(){ var m=document.getElementById('modal-bg'); if(m)m.remove(); }

/* ---------- Rendu ---------- */
var PAGES={ dash:pageDash, emises:pageEmises, suivi:pageSuivi, recues:pageRecues, contacts:pageContacts, catalogue:pageCatalogue, societes:pageSocietes, donnees:pageDonnees };
function render(){ document.getElementById('app').innerHTML=sidebar()+(PAGES[current]||pageDash)(); if(current==='recues') bindDrop(); }

if('serviceWorker' in navigator){ window.addEventListener('load',function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); }); }
ensureSocietes(); save(); render();
</script>
</body>
