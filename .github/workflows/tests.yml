name: Smoke — YADA 1.2

# Filet de fumée : vérifie sur chaque push / PR que index.html (YADA 1.2)
# se charge sans erreur de page et rend sa coquille.
on:
  push:
    branches: [main, 'claude/**']
    paths:
      - index.html
      - tests/**
      - .github/workflows/tests.yml
  pull_request:
    paths:
      - index.html
      - tests/**
      - .github/workflows/tests.yml
  workflow_dispatch: {}

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer Playwright (Chromium)
        run: |
          npm init -y >/dev/null 2>&1
          npm i playwright@^1.48
          # Repli sans apt si les dépôts du runner posent problème : le binaire suffit.
          npx playwright install --with-deps chromium || npx playwright install chromium

      - name: Filet de fumée YADA 1.2
        run: node tests/smoke.mjs
