name: Archive ZIP du squelette

# Régénère automatiquement yada-precompta-github.zip à chaque mise à jour
# du logiciel sur main (nouvelle version), puis le recommite.
on:
  push:
    branches: [main]
    paths:
      - precompta.html
      - sw.js
      - manifest.webmanifest
      - icon-192.png
      - icon-512.png
      - index.html
      - CLAUDE.md
      - ROADMAP.md
      - README.md
      - PASSATION-YADA-Precompta.md
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-zip
  cancel-in-progress: false

jobs:
  zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Générer version.json depuis le badge de version
        run: |
          # Badge actuel : « YADA · vNNN » (l'ancien motif « vNNN · noir & bleu » n'existe plus).
          # `|| true` : sous bash -e, une assignation dont la substitution échoue tue le job.
          V=$(grep -oE "YADA · v[0-9]+" precompta.html | head -1 | grep -oE "[0-9]+" || true)
          if [ -n "$V" ]; then
            echo "{\"version\":\"$V\"}" > version.json
            echo "version.json → $V"
          else
            echo "Version introuvable — version.json inchangé."
          fi

      - name: Construire l'archive
        run: |
          rm -f yada-precompta-github.zip
          zip -q yada-precompta-github.zip \
            precompta.html sw.js manifest.webmanifest \
            icon-192.png icon-512.png index.html version.json \
            CLAUDE.md ROADMAP.md README.md PASSATION-YADA-Precompta.md
          echo "Contenu :" && unzip -l yada-precompta-github.zip

      - name: Recommiter si quelque chose a changé
        run: |
          if git diff --quiet -- yada-precompta-github.zip version.json; then
            echo "Rien à committer."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add yada-precompta-github.zip version.json
            git commit -m "chore: régénération auto archive ZIP + version.json [skip ci]"
            git push
          fi
