name: Archive ZIP de YADA PRO

# Régénère yada-pro.zip à chaque mise à jour sur main, et aligne version.json
# sur la version déclarée dans index.html.
on:
  push:
    branches: [main]
    paths:
      - index.html
      - sw.js
      - manifest.webmanifest
      - icon-192.png
      - icon-512.png
      - CLAUDE.md
      - README.md
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-zip
  cancel-in-progress: false

jobs:
  zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Générer version.json depuis index.html
        run: |
          V=$(grep -oE 'name="yada-version" content="[^"]+"' index.html | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || true)
          if [ -n "$V" ]; then echo "{\"version\":\"$V\"}" > version.json; echo "version.json → $V"; else echo "Version introuvable — inchangé."; fi
      - name: Construire l'archive
        run: |
          rm -f yada-pro.zip
          zip -q yada-pro.zip index.html sw.js manifest.webmanifest icon-192.png icon-512.png version.json CLAUDE.md README.md
          echo "Contenu :" && unzip -l yada-pro.zip
      - name: Recommiter si changé
        run: |
          if git diff --quiet -- yada-pro.zip version.json; then
            echo "Rien à committer."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add yada-pro.zip version.json
            git commit -m "chore: régénération auto archive ZIP + version.json [skip ci]"
            git push
          fi
